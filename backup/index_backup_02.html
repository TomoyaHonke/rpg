<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ドット絵RPG</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
    }
    h1 {
      color: #ffd700;
      font-size: 22px;
      margin-bottom: 8px;
      letter-spacing: 4px;
    }
    #gamePanel {
      border: 3px solid #444466;
      display: flex;
      flex-direction: column;
    }
    #statusBar {
      background: #12122a;
      border-bottom: 1px solid #333355;
      padding: 6px 14px;
      display: flex;
      align-items: center;
      gap: 18px;
      font-family: 'Courier New', monospace;
      color: #fff;
    }
    #statusName  { color: #ffd700; font-size: 13px; white-space: nowrap; }
    .statGroup   { display: flex; align-items: center; gap: 6px; }
    .statLabel   { font-size: 12px; width: 20px; }
    .statLabel.hp { color: #ff6666; }
    .statLabel.mp { color: #6699ff; }
    .barBg       { background: #111; width: 110px; height: 10px; border: 1px solid #555; }
    .barFill     { height: 100%; background: #dd3333; }
    .barFill.mp  { background: #3366cc; }
    #hpText, #mpText { font-size: 11px; color: #ccc; min-width: 44px; }
    #locationLabel { color: #ffd700; font-size: 12px; margin-left: auto; white-space: nowrap; }
    canvas { display: block; }
    #btnArea {
      margin-top: 8px;
      display: flex;
      gap: 8px;
      min-height: 44px;
    }
    .btn {
      background: #1a1a3a;
      color: #ffffff;
      border: 2px solid #5555aa;
      padding: 8px 20px;
      font-family: 'Courier New', monospace;
      font-size: 15px;
      cursor: pointer;
    }
    .btn:hover { background: #2a2a5a; }
    #notification {
      min-height: 24px;
      margin-top: 6px;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      color: #aaffaa;
      text-align: center;
      letter-spacing: 1px;
      text-shadow: 0 0 10px #44ff88;
    }
    #hint { margin-top: 4px; color: #666688; font-size: 12px; }
  </style>
</head>

  function shadeHex(hex, amount) {
    const raw = hex.replace('#', '');
    const num = parseInt(raw, 16);
    const r = Math.max(0, Math.min(255, (num >> 16) + amount));
    const g = Math.max(0, Math.min(255, ((num >> 8) & 255) + amount));
    const b = Math.max(0, Math.min(255, (num & 255) + amount));

    return `#${((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1)}`;
  }

  // min〜max のランダム整数を返す
  function rng(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }

  // シャドウ付きテキストを描画する
  function txt(s, x, y, col = '#fff', sz = 14) {
    ctx.font = `${sz}px "Courier New", monospace`;
    ctx.fillStyle = '#000';
    ctx.fillText(s, x + 1, y + 1); // 影
    ctx.fillStyle = col;
    ctx.fillText(s, x, y);
  }

  // HPバー（横長のゲージ）を描画する
  function drawBar(x, y, w, cur, max, col) {
    ctx.fillStyle = '#111';
    ctx.fillRect(x, y, w, 10);
    ctx.fillStyle = col;
    ctx.fillRect(x, y, Math.round(w * cur / max), 10);
    ctx.strokeStyle = '#888';
    ctx.lineWidth = 1;
    ctx.strokeRect(x, y, w, 10);
  }

  function getCurrentWeapon() {
    return WEAPONS[hero.weapon] || WEAPONS.woodSword;
  }

  function getHeroAttack() {
    return hero.atk + getCurrentWeapon().attackBonus;
  }

  function getCurrentArmor() {
    return ARMORS[hero.armor] || ARMORS.travelerClothes;
  }

  function getHeroDefense() {
    return hero.def + getCurrentArmor().defenseBonus;
  }

  function getEquipItems() {
    const weaponItems = hero.weaponsOwned
      .filter(id => WEAPONS[id])
      .map(id => ({ type: 'weapon', id, item: WEAPONS[id] }));
    const armorItems = hero.armorsOwned
      .filter(id => ARMORS[id])
      .map(id => ({ type: 'armor', id, item: ARMORS[id] }));
    return [...weaponItems, ...armorItems];
  }

  // 経験値を加算し、一定値に達したらレベルアップする
  function gainExp(amount) {
    hero.exp += amount;
    let leveled = false;
    while (hero.exp >= hero.level * 20) {
      hero.exp -= hero.level * 20;
      hero.level++;
      hero.maxHp += 5;
      hero.maxMp += 2;
      hero.atk += 2;
      hero.hp = hero.maxHp;
      hero.mp = hero.maxMp;
      leveled = true;
    }
    return leveled;
  }

  // ============================================================
  // hero.png（2×2スプライトシート）から向きに対応するコマ位置を返す。
  // 戻り値: { img, sx, sy, frameW, frameH } または null（未ロード時 → fillRect フォールバック）
  // 【歩行アニメ拡張時】コマ数を増やし frame 引数で sx に列オフセットを加算する。
  function getHeroSpriteInfo(dir) {
    const img = spriteImgs.hero;
    if (!img || !img._ready) return null;
    const frameW = img.width  / 2;
    const frameH = img.height / 2;
    const srcMap = { down: [0, 0], right: [frameW, 0], left: [0, frameH], up: [frameW, frameH] };
    const [sx, sy] = srcMap[dir] ?? [0, 0];
    return { img, sx, sy, frameW, frameH };
  }

  function drawEnemy(enemy, px, py, sc = 1) {
    if (enemy.sprite === 'bat') {
      drawBat(px, py, sc);
    } else if (enemy.sprite === 'goblin') {
      drawGoblin(px, py, sc);
    } else if (enemy.sprite === 'darkKnight') {
      drawDarkKnight(px, py, sc);
    } else {
      drawSlime(px, py, sc);
    }
  }

  // ============================================================
  // スプライト描画：NPC
  //   bodyCol = 体の色、hairCol = 髪の色（NPCごとに異なる）
  // ============================================================
  function drawNPC(px, py, sc, bodyCol, hairCol) {
    ctx.save();
    ctx.translate(px, py);
    ctx.scale(sc, sc);

    // ── 画像ベース描画（読み込み済みなら drawImage を優先） ────────────
    // 注意: 画像使用時は bodyCol/hairCol による色変化は反映されません
    if (spriteImgs.npc && spriteImgs.npc._ready) {
      ctx.drawImage(spriteImgs.npc, 0, 0, 32, 32);
      ctx.restore();
      return;
    }

    // 足
    ctx.fillStyle = '#444';
    ctx.fillRect(10, 25, 5, 6);
    ctx.fillRect(17, 25, 5, 6);

    // 体（bodyColで色を変える）
    ctx.fillStyle = bodyCol;
    ctx.fillRect(9, 14, 14, 12);
    ctx.fillStyle = shadeHex(bodyCol, 35);
    ctx.fillRect(9, 14, 9, 2);
    ctx.fillRect(9, 16, 3, 7);
    ctx.fillStyle = shadeHex(bodyCol, -45);
    ctx.fillRect(19, 17, 4, 9);
    ctx.fillRect(12, 24, 11, 2);

    // 腕（肌色）
    ctx.fillStyle = '#ffcc99';
    ctx.fillRect(5, 15, 5, 8);
    ctx.fillRect(22, 15, 5, 8);
    ctx.fillStyle = '#ffe0b8';
    ctx.fillRect(5, 15, 3, 2);
    ctx.fillRect(22, 15, 3, 2);
    ctx.fillStyle = '#d99a66';
    ctx.fillRect(8, 20, 2, 3);
    ctx.fillRect(25, 20, 2, 3);

    // 首・頭（肌色）
    ctx.fillStyle = '#ffcc99';
    ctx.fillRect(13, 11, 6, 4);
    ctx.fillRect(9, 5, 14, 10);

    // 髪（hairColで色を変える）
    ctx.fillStyle = hairCol;
    ctx.fillRect(9, 5, 14, 4);
    ctx.fillRect(9, 5, 3, 8);
    ctx.fillRect(20, 5, 3, 8);
    ctx.fillStyle = shadeHex(hairCol, 35);
    ctx.fillRect(9, 5, 9, 1);
    ctx.fillRect(9, 6, 3, 4);
    ctx.fillStyle = shadeHex(hairCol, -45);
    ctx.fillRect(19, 8, 4, 1);
    ctx.fillRect(20, 9, 3, 4);

    // 目
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(12, 11, 2, 2);
    ctx.fillRect(18, 11, 2, 2);
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(12, 11, 1, 1);
    ctx.fillRect(18, 11, 1, 1);

    ctx.restore();
  }

  // ============================================================
  // タイル1枚を描画する
  // ============================================================
  function drawTorch(x, y) {
    const p = n => Math.max(1, Math.round(n * TILE_RENDER / 32));

    // 松明の周囲の光
    ctx.fillStyle = 'rgba(255, 200, 80, 0.12)';
    ctx.fillRect(x + p(6), y + p(4), p(20), p(20));

    // 木の柄
    ctx.fillStyle = '#5a3a1a';
    ctx.fillRect(x + p(14), y + p(10), p(2), p(10));

    // 炎（3段階）
    ctx.fillStyle = '#ff6633';
    ctx.fillRect(x + p(12), y + p(6), p(6), p(6));

    ctx.fillStyle = '#ffcc33';
    ctx.fillRect(x + p(13), y + p(7), p(4), p(4));

    ctx.fillStyle = '#ffff66';
    ctx.fillRect(x + p(14), y + p(8), p(2), p(2));
  }

  // ============================================================
  // タイル画像キー判定
  //   col, row のタイルに対応する TILE_IMAGES キーを返す。
  //   画像を用意していないタイルは null を返す → fillRect フォールバック。
  // ============================================================
  function getTileImageKey(col, row) {
    const t         = currentMap[row][col];
    const isDungeon = currentMap === dungeonMap;
    const isHouse   = isHouseMap(currentMap);

    if (t === T.GRASS) {
      if (isHouse)   return 'house_floor';
      if (isDungeon) return 'cave_floor';
      return 'grass';
    }
    if (t === T.TREE) {
      if (isHouse)   return 'house_wall';
      if (isDungeon) return 'cave_wall';
      return 'tree';
    }
    if (t === T.WATER)  return isDungeon ? 'cave_water'   : 'water';
    if (t === T.FLOWER) return isDungeon ? 'cave_crystal' : 'flower';
    if (t === T.STONE) {
      if (isHouse)   return 'house_floor';
      if (isDungeon) return 'cave_floor';
      return 'stone';
    }
    if (t === T.CHEST)        return chestOpened ? 'chest_open' : 'chest_closed';
    if (t === T.TOWN_GATE)    return isHouse ? 'house_exit' : 'town_gate';
    if (t === T.DUNGEON_GATE) return 'dungeon_gate';
    if (t === T.HOUSE) {
      if (isHouse) return 'house_furniture';
      // 2×2 建物の4分割パートを判定
      const hasLeft = col > 0 && currentMap[row][col - 1] === T.HOUSE;
      const hasTop  = row > 0 && currentMap[row - 1][col] === T.HOUSE;
      const part    = hasTop ? (hasLeft ? 'br' : 'bl') : (hasLeft ? 'tr' : 'tl');
      const isInn   = currentMap === townMap && col >= 5 && col <= 6 && row >= 5 && row <= 6;
      const isShop  = currentMap === townMap && col >= 9 && col <= 10 && row >= 5 && row <= 6;
      if (part === 'bl' && isInn)  return 'house_inn_bl';
      if (part === 'bl' && isShop) return 'house_shop_bl';
      return `house_${part}`;
    }
    return null;
  }

  // ============================================================
  // タイル画像の事前ロード（ゲーム開始時に一度だけ呼び出す）
  //   onload で ._ready = true になったものだけ drawImage で使用。
  //   ファイルが存在しない場合は onerror になるが、._ready は false のまま
  //   なので自動的に fillRect フォールバックが使われる。
  // ============================================================
  function loadTileImages() {
    for (const [key, src] of Object.entries(TILE_IMAGES)) {
      const img    = new Image();
      img._ready   = false;
      img.onload   = () => { img._ready = true; };
      img.onerror  = () => { /* ファイルなし → fillRect フォールバック */ };
      img.src      = src;
      tileImgs[key] = img;
    }
  }

  // ============================================================
  // スプライト画像の事前ロード（ゲーム開始時に一度だけ呼び出す）
  //   loadTileImages() と同じ仕組み。._ready が true になったものだけ drawImage 使用。
  // ============================================================
  function loadSpriteImages() {
    for (const [key, src] of Object.entries(SPRITE_IMAGES)) {
      const img   = new Image();
      img._ready  = false;
      img.onload  = () => { img._ready = true; };
      img.onerror = () => { /* ファイルなし → fillRect フォールバック */ };
      img.src     = src;
      spriteImgs[key] = img;
    }
  }

  function drawTile(col, row, camCol = 0, camRow = 0) {
    const x = Math.round((col - camCol) * TILE_RENDER);
    const y = Math.round((row - camRow) * TILE_RENDER);
    const t = currentMap[row][col];

    // ── 画像ベース描画（読み込み済みなら drawImage を優先） ────────────
    const imgKey = getTileImageKey(col, row);
    if (imgKey && tileImgs[imgKey] && tileImgs[imgKey]._ready) {
      ctx.drawImage(tileImgs[imgKey], x, y, TILE_RENDER, TILE_RENDER);
      // 松明エフェクトは画像タイルの上にオーバーレイする
      if (currentMap === dungeonMap && t === T.TREE && (col + row) % 7 === 0) {
        drawTorch(x, y);
      }
      return;
    }

    // ── フォールバック: fillRect 描画（画像が未ロード・未配置の場合） ──
    const p = n => Math.max(1, Math.round(n * TILE_RENDER / 32)); // 描画スケール関数
    const dot = (dx, dy, col) => {
      ctx.fillStyle = col;
      ctx.fillRect(x + p(dx), y + p(dy), p(1), p(1));
    };
    const isDungeon = currentMap === dungeonMap;
    const isHouse = isHouseMap(currentMap);

    const grassBase = () => {
      ctx.fillStyle = '#4f963f'; ctx.fillRect(x, y, TILE_RENDER, TILE_RENDER);
      ctx.fillStyle = '#69b85a';
      ctx.fillRect(x + p(3),  y + p(4),  p(3), p(1));
      ctx.fillRect(x + p(10), y + p(12), p(3), p(1));
      ctx.fillRect(x + p(19), y + p(5),  p(2), p(2));
      ctx.fillRect(x + p(7),  y + p(25), p(3), p(1));
      ctx.fillStyle = '#39722f';
      ctx.fillRect(x + p(18), y + p(18), p(2), p(1));
      ctx.fillRect(x + p(24), y + p(21), p(3), p(1));
      ctx.fillRect(x + p(13), y + p(27), p(2), p(1));
      ctx.fillRect(x + p(27), y + p(27), p(3), p(1));
      for (let i = 0; i < 18; i++) {
        const seed = (col * 73 + row * 97 + i * 53) & 255;
        const dx = (seed * 17 + i * 11) % 30 + 1;
        const dy = (seed * 29 + i * 7) % 30 + 1;
        const shade = dx + dy > 42 && seed % 3 !== 0 ? '#2f6429' : seed % 2 === 0 ? '#69b85a' : '#4f963f';
        dot(dx, dy, shade);
      }
    };

    // ============================================================
    // 洞窟専用タイル描画
    // ============================================================
    const caveFloor = () => {
      // 暗い岩床（通路・歩けるエリア）
      ctx.fillStyle = '#2a2824'; ctx.fillRect(x, y, TILE_RENDER, TILE_RENDER);
      ctx.fillStyle = '#1e1c1a';
      ctx.fillRect(x,          y,          TILE_RENDER,  p(1));
      ctx.fillRect(x,          y,          p(1),  TILE_RENDER);
      ctx.fillRect(x + p(16),  y + p(1),   p(1),  p(15));
      ctx.fillRect(x + p(1),   y + p(16),  p(15), p(1));
      ctx.fillRect(x + p(17),  y + p(16),  p(15), p(1));
      ctx.fillRect(x,          y + p(16),  p(1),  p(16));
      ctx.fillStyle = '#353028';
      ctx.fillRect(x + p(2),   y + p(2),   p(12), p(12));
      ctx.fillRect(x + p(18),  y + p(18),  p(12), p(12));
      ctx.fillStyle = '#3f3a34';
      ctx.fillRect(x + p(3),   y + p(3),   p(4),  p(1));
      ctx.fillRect(x + p(20),  y + p(19),  p(4),  p(1));
      const s = (col * 71 + row * 89) & 255;
      if (s % 5 === 0) { ctx.fillStyle = '#221f1d'; ctx.fillRect(x + p(8),  y + p(10), p(3), p(1)); }
      if (s % 7 === 1) { ctx.fillStyle = '#1e1c1a'; ctx.fillRect(x + p(20), y + p(8),  p(2), p(2)); }
    };

    const caveWall = () => {
      // 岩壁（通れないエリア）
      ctx.fillStyle = '#1a1816'; ctx.fillRect(x, y, TILE_RENDER, TILE_RENDER);
      ctx.fillStyle = '#141210';
      ctx.fillRect(x,          y + p(20), TILE_RENDER,  p(12));
      ctx.fillStyle = '#252220';
      ctx.fillRect(x + p(3),   y + p(2),  p(26), p(18));
      ctx.fillStyle = '#2e2a28';
      ctx.fillRect(x + p(6),   y + p(4),  p(20), p(12));
      // 岩肌テクスチャ・ひび
      ctx.fillStyle = '#3a3530';
      ctx.fillRect(x + p(7),   y + p(5),  p(5),  p(2));
      ctx.fillRect(x + p(18),  y + p(10), p(6),  p(2));
      ctx.fillRect(x + p(10),  y + p(15), p(4),  p(3));
      ctx.fillStyle = '#1a1816';
      ctx.fillRect(x + p(8),   y + p(6),  p(2),  p(8));
      ctx.fillRect(x + p(20),  y + p(4),  p(2),  p(6));
      ctx.fillStyle = '#403c38';
      ctx.fillRect(x + p(9),   y + p(4),  p(3),  p(1));
      ctx.fillRect(x + p(19),  y + p(9),  p(4),  p(1));
      // 苔（暗緑）
      ctx.fillStyle = '#1c2518';
      ctx.fillRect(x + p(4),   y + p(16), p(4),  p(3));
      ctx.fillRect(x + p(22),  y + p(20), p(5),  p(3));
      dot(14, 8, '#2e2a28'); dot(24, 14, '#403c38'); dot(6, 24, '#141210');
    };

    const caveWater = () => {
      // 地下水（暗く静かな水面）
      ctx.fillStyle = '#0d1520'; ctx.fillRect(x, y, TILE_RENDER, TILE_RENDER);
      ctx.fillStyle = '#0a1018';
      ctx.fillRect(x,          y + p(24), TILE_RENDER,  p(8));
      ctx.fillStyle = '#111a28';
      ctx.fillRect(x,          y + p(2),  TILE_RENDER,  p(3));
      ctx.fillStyle = '#162030';
      ctx.fillRect(x + p(3),   y + p(7),  p(10), p(2));
      ctx.fillRect(x + p(16),  y + p(19), p(10), p(2));
      ctx.fillRect(x + p(6),   y + p(24), p(7),  p(1));
      ctx.fillStyle = '#1e2e40';
      ctx.fillRect(x + p(5),   y + p(14), p(8),  p(2));
      ctx.fillRect(x + p(18),  y + p(5),  p(5),  p(1));
      // うっすらした水面の反射
      ctx.fillStyle = '#1a3050';
      ctx.fillRect(x + p(7),   y + p(7),  p(3),  p(1));
      ctx.fillRect(x + p(20),  y + p(19), p(3),  p(1));
      dot(26, 26, '#080e16'); dot(3, 21, '#080e16'); dot(14, 13, '#1e3050');
    };

    const caveCrystal = () => {
      // 石床＋結晶クラスター
      caveFloor();
      ctx.fillStyle = '#3a4a6a';
      ctx.fillRect(x + p(12), y + p(16), p(8),  p(12));
      ctx.fillStyle = '#4a5a88';
      ctx.fillRect(x + p(13), y + p(14), p(4),  p(5));
      ctx.fillRect(x + p(19), y + p(16), p(3),  p(4));
      ctx.fillStyle = '#6070aa';
      ctx.fillRect(x + p(14), y + p(11), p(3),  p(5));
      ctx.fillRect(x + p(18), y + p(13), p(2),  p(5));
      ctx.fillStyle = '#8090cc';
      ctx.fillRect(x + p(15), y + p(9),  p(2),  p(4));
      // 結晶ハイライト
      ctx.fillStyle = '#aab8ee';
      ctx.fillRect(x + p(15), y + p(9),  p(1),  p(2));
      ctx.fillRect(x + p(18), y + p(13), p(1),  p(1));
      // 小石
      ctx.fillStyle = '#4a4540';
      ctx.fillRect(x + p(4),  y + p(20), p(3),  p(2));
      ctx.fillRect(x + p(24), y + p(22), p(3),  p(2));
      ctx.fillStyle = '#5a5550';
      ctx.fillRect(x + p(4),  y + p(20), p(2),  p(1));
    };

    const houseFloor = () => {
      ctx.fillStyle = '#6a4a28'; ctx.fillRect(x, y, TILE_RENDER, TILE_RENDER);
      ctx.fillStyle = '#7a5630';
      ctx.fillRect(x, y, TILE_RENDER, p(2));
      ctx.fillRect(x, y + p(15), TILE_RENDER, p(1));
      ctx.fillStyle = '#4a321d';
      ctx.fillRect(x, y + p(30), TILE_RENDER, p(2));
      ctx.fillRect(x + p(15), y, p(1), TILE_RENDER);
    };

    const houseWall = () => {
      ctx.fillStyle = '#3a2418'; ctx.fillRect(x, y, TILE_RENDER, TILE_RENDER);
      ctx.fillStyle = '#5a3520';
      ctx.fillRect(x + p(2), y + p(2), p(28), p(28));
      ctx.fillStyle = '#2a1810';
      ctx.fillRect(x, y + p(24), TILE_RENDER, p(8));
      ctx.fillStyle = '#7a4a2a';
      ctx.fillRect(x + p(4), y + p(5), p(24), p(3));
      ctx.fillRect(x + p(4), y + p(14), p(24), p(3));
    };

    const houseExit = () => {
      houseFloor();
      ctx.fillStyle = '#2b1a0c';
      ctx.fillRect(x + p(7), y + p(8), p(18), p(22));
      ctx.fillStyle = '#553311';
      ctx.fillRect(x + p(8), y + p(9), p(16), p(21));
      ctx.fillStyle = '#7a4a20';
      ctx.fillRect(x + p(9), y + p(10), p(6), p(3));
      ctx.fillStyle = '#e0b84a';
      ctx.fillRect(x + p(20), y + p(19), p(2), p(2));
    };

    if (t === T.TREE) {
      if (isHouse) {
        houseWall();
      } else if (isDungeon) {
        caveWall();
      } else {
        grassBase();
        ctx.fillStyle = '#5c4033'; ctx.fillRect(x + p(13), y + p(19), p(6), p(13));
        ctx.fillStyle = '#7a543d'; ctx.fillRect(x + p(15), y + p(20), p(2), p(10));
        ctx.fillStyle = '#3b261d'; ctx.fillRect(x + p(13), y + p(24), p(1), p(6));
        ctx.fillStyle = '#2d5a1b'; ctx.fillRect(x + p(6),  y + p(14), p(20), p(12));
        ctx.fillStyle = '#3a7222'; ctx.fillRect(x + p(8),  y + p(8),  p(16), p(11));
        ctx.fillStyle = '#4a8c2a'; ctx.fillRect(x + p(11), y + p(4),  p(10), p(8));
        ctx.fillStyle = '#1f4315';
        ctx.fillRect(x + p(7),  y + p(20), p(4), p(2));
        ctx.fillRect(x + p(20), y + p(18), p(4), p(2));
        ctx.fillRect(x + p(10), y + p(11), p(3), p(2));
        ctx.fillStyle = '#5ca83a';
        ctx.fillRect(x + p(12), y + p(6),  p(3), p(2));
        ctx.fillRect(x + p(16), y + p(10), p(4), p(2));
        ctx.fillRect(x + p(9),  y + p(16), p(5), p(2));
        dot(23, 13, '#5ca83a'); dot(18, 5, '#6fbd47'); dot(14, 23, '#244f18');
      }

    } else if (t === T.WATER) {
      if (isDungeon) {
        caveWater();
      } else {
        ctx.fillStyle = '#1a4488'; ctx.fillRect(x, y, TILE_RENDER, TILE_RENDER);
        ctx.fillStyle = '#173a75';
        ctx.fillRect(x, y + p(26), TILE_RENDER, p(6));
        ctx.fillStyle = '#1f4f9d';
        ctx.fillRect(x, y + p(3), TILE_RENDER, p(3));
        ctx.fillStyle = '#2255aa';
        ctx.fillRect(x + p(2),  y + p(8),  p(13), p(2));
        ctx.fillRect(x + p(16), y + p(20), p(12), p(2));
        ctx.fillRect(x + p(5),  y + p(25), p(9),  p(1));
        ctx.fillRect(x + p(22), y + p(12), p(7),  p(1));
        ctx.fillStyle = '#3377cc';
        ctx.fillRect(x + p(4),  y + p(16), p(9), p(2));
        ctx.fillRect(x + p(18), y + p(6),  p(6), p(1));
        ctx.fillRect(x + p(10), y + p(29), p(8), p(1));
        ctx.fillStyle = '#6aa7e8';
        ctx.fillRect(x + p(6),  y + p(8),  p(4), p(1));
        ctx.fillRect(x + p(20), y + p(20), p(4), p(1));
        dot(27, 27, '#0f2f66'); dot(2, 22, '#0f2f66'); dot(14, 14, '#6aa7e8');
      }

    } else if (t === T.FLOWER) {
      if (isDungeon) {
        caveCrystal();
      } else {
        grassBase();
        ctx.fillStyle = '#5aa84e';
        ctx.fillRect(x + p(4),  y + p(6),  p(2), p(2));
        ctx.fillRect(x + p(20), y + p(20), p(2), p(2));
        ctx.fillStyle = '#3a6e30'; ctx.fillRect(x + p(15), y + p(18), p(2), p(8));
        ctx.fillStyle = '#c93f82';
        ctx.fillRect(x + p(11), y + p(12), p(4), p(4));
        ctx.fillRect(x + p(17), y + p(12), p(4), p(4));
        ctx.fillRect(x + p(14), y + p(9),  p(4), p(4));
        ctx.fillRect(x + p(14), y + p(15), p(4), p(4));
        ctx.fillStyle = '#ff66aa';
        ctx.fillRect(x + p(11), y + p(12), p(3), p(3));
        ctx.fillRect(x + p(17), y + p(12), p(3), p(3));
        ctx.fillRect(x + p(14), y + p(9),  p(3), p(3));
        ctx.fillRect(x + p(14), y + p(15), p(3), p(3));
        ctx.fillStyle = '#ff99c8';
        ctx.fillRect(x + p(11), y + p(12), p(2), p(1));
        ctx.fillRect(x + p(17), y + p(12), p(2), p(1));
        ctx.fillRect(x + p(14), y + p(9),  p(2), p(1));
        ctx.fillRect(x + p(14), y + p(15), p(2), p(1));
        ctx.fillStyle = '#d6b800'; ctx.fillRect(x + p(14), y + p(12), p(4), p(4));
        ctx.fillStyle = '#ffee00'; ctx.fillRect(x + p(14), y + p(12), p(3), p(2));
      }

    } else if (t === T.STONE) {
      if (isHouse) {
        houseFloor();
      } else if (isDungeon) {
        caveFloor();
      } else {
        // 石畳（街の床）
        ctx.fillStyle = '#8a8070'; ctx.fillRect(x, y, TILE_RENDER, TILE_RENDER);
        ctx.fillStyle = '#6a6058';
        ctx.fillRect(x,          y,          TILE_RENDER,  p(1));
        ctx.fillRect(x,          y,          p(1),  TILE_RENDER);
        ctx.fillRect(x + p(16),  y + p(1),   p(1),  p(15));
        ctx.fillRect(x + p(1),   y + p(16),  p(15), p(1));

  // ============================================================
  // NPC ユーティリティ
  // ============================================================
  function getCurrentNpcs() {
    if (currentMap === townMap) return NPCS;
    if (currentHouseId === 'inn') return INN_NPCS;
    if (currentHouseId === 'shop') return SHOP_NPCS;
    return [];
  }

  function isShopAvailable() {
    return currentHouseId === 'shop' && !!talkNpc && !!talkNpc.shop;
  }

  // 指定座標にいるNPCを返す（いなければ null）
  function getNpcAt(x, y) {
    return getCurrentNpcs().find(n => n.x === x && n.y === y) || null;
  }

  // プレイヤーの隣（上下左右）にいるNPCを返す（いなければ null）
  function getAdjacentNpc() {
    for (const [dx, dy] of [[0,-1],[0,1],[-1,0],[1,0]]) {
      const n = getNpcAt(hero.x + dx, hero.y + dy);
      if (n) return n;
    }
    return null;
  }

  // ============================================================
  // 描画座標を hero.x/y にスナップ（マップ切り替え時・ロード時に使用）
  // ============================================================
  function snapDrawPos() {
    hero.drawX = hero.x;
    hero.drawY = hero.y;
    moveAnim.active = false;
  }

  // ============================================================
  // 移動補間を毎フレーム更新（loop() から呼び出す）
  // ============================================================
  function updateMove() {
    if (!moveAnim.active) return;
    moveAnim.progress = Math.min(1, moveAnim.progress + 1 / MOVE_FRAMES);
    // easeInOut（滑らかな加減速）
    const p = moveAnim.progress;
    const t = p < 0.5 ? 2 * p * p : 1 - Math.pow(-2 * p + 2, 2) / 2;
    hero.drawX = moveAnim.startX + (hero.x - moveAnim.startX) * t;
    hero.drawY = moveAnim.startY + (hero.y - moveAnim.startY) * t;
    if (moveAnim.progress >= 1) {
      moveAnim.active = false;
      hero.drawX = hero.x;
      hero.drawY = hero.y;
    }
  }

  // ============================================================
  // マップ画面を描画する
  // ============================================================
  function renderMap() {
    // ── カメラ計算（hero.drawX/drawY 追従、小数値のまま保持） ───────────
    const camCol = Math.max(0, Math.min(COLS - VIEW_COLS, hero.drawX - VIEW_COLS / 2));
    const camRow = Math.max(0, Math.min(ROWS - VIEW_ROWS, hero.drawY - VIEW_ROWS / 2));

    // ── 可視タイルを描画（サブピクセルカメラ対応で +1 余分に描く） ──────
    const c0 = Math.floor(camCol), r0 = Math.floor(camRow);
    for (let r = r0; r < Math.min(r0 + VIEW_ROWS + 1, ROWS); r++)
      for (let c = c0; c < Math.min(c0 + VIEW_COLS + 1, COLS); c++)
        drawTile(c, r, camCol, camRow);

    // ダンジョン暗闇オーバーレイ
    if (currentMap === dungeonMap) {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.32)';
      ctx.fillRect(0, 0, VIEW_W, VIEW_H);
    }

    // ── NPC 描画（NPC_SC + NPC_OFF で中央下寄せ） ──────────────────────
    const npcs = getCurrentNpcs();
    if (npcs.length > 0) {
      for (const npc of npcs) {
        const npcSX = Math.round((npc.x - camCol) * TILE_RENDER);
        const npcSY = Math.round((npc.y - camRow) * TILE_RENDER);
        // カメラ範囲外はスキップ（描画領域外に大きくはみ出す場合）
        if (npcSX < -TILE_RENDER || npcSX > VIEW_W || npcSY < -TILE_RENDER || npcSY > VIEW_H) continue;
        drawNPC(npcSX + NPC_OFF.x, npcSY + NPC_OFF.y, NPC_SC, npc.bodyCol, npc.hairCol);
        // 「！」バルーン（NPC の頭上に配置）
        const bs = NPC_SC;
        const bx = npcSX + NPC_OFF.x + Math.round(12 * bs);
        const by = npcSY + NPC_OFF.y  - Math.round(8  * bs);
        ctx.fillStyle = '#ffffcc';
        ctx.fillRect(bx - 2 * bs, by - 2 * bs, 10 * bs, 11 * bs);
        ctx.fillStyle = '#884400';
        ctx.fillRect(bx,          by,           6 * bs, 4 * bs);
        ctx.fillRect(bx,          by + 5 * bs,  6 * bs, 2 * bs);
        ctx.fillRect(bx,          by + 8 * bs,  6 * bs, 2 * bs);
      }
    }

    // ── ボス描画（BOSS_SC + BOSS_OFF で中央下寄せ） ────────────────────
    if (currentMap === dungeonMap && !bossDefeated) {
      const bx = BOSS_POS.x, by = BOSS_POS.y;
      const bossSX = Math.round((bx - camCol) * TILE_RENDER);
      const bossSY = Math.round((by - camRow) * TILE_RENDER);
      if (bossSX > -TILE_RENDER && bossSX < VIEW_W && bossSY > -TILE_RENDER && bossSY < VIEW_H) {
        drawDarkKnight(bossSX + BOSS_OFF.x, bossSY + BOSS_OFF.y, BOSS_SC);
      }
    }

    // ── 主人公描画（hero.drawX/drawY で補間済み位置から描画） ───────────
    const heroSX = Math.round((hero.drawX - camCol) * TILE_RENDER);
    const heroSY = Math.round((hero.drawY - camRow) * TILE_RENDER);
    drawHero(heroSX + HERO_OFF.x, heroSY + HERO_OFF.y, HERO_SC);
  }

    const items = getEquipItems();

    txt('武器', 74, 126, '#aaffaa', 14);
    txt('防具', 286, 126, '#aaffaa', 14);

    let index = 0;
    const drawItem = (entry, x, y) => {
      const selected = index === equipCursor;
      const equipped = entry.type === 'weapon' ? hero.weapon === entry.id : hero.armor === entry.id;
      if (selected) {
        ctx.fillStyle = '#333366';
        ctx.fillRect(x - 10, y - 15, 174, 20);

      index++;

    let wy = 152;
    for (const id of hero.weaponsOwned.filter(id => WEAPONS[id])) {
      drawItem({ type: 'weapon', id, item: WEAPONS[id] }, 74, wy);
      wy += 24;

    let ay = 152;
    for (const id of hero.armorsOwned.filter(id => ARMORS[id])) {
      drawItem({ type: 'armor', id, item: ARMORS[id] }, 286, ay);
      ay += 24;
    }

    txt(`攻撃 ${getHeroAttack()}  防御 ${getHeroDefense()}`, 64, 318, '#ffffff', 14);
    ctx.restore();
  }

  // ============================================================
  // メインループ（毎フレーム呼ばれる）
  // ============================================================
  // ============================================================
  // HTML ステータスバーを更新する
  // ============================================================
  function updateStatusBar() {
    document.getElementById('statusName').textContent = `Lv.${hero.level}  ゆうしゃ  ${getCurrentWeapon().name}  ${getCurrentArmor().name}  EXP ${hero.exp}  G ${hero.gold}`;

    // HP バー
    const hpRatio = hero.hp / hero.maxHp;
    const hpFill  = document.getElementById('hpBarFill');
    hpFill.style.width      = `${Math.round(hpRatio * 100)}%`;
    hpFill.style.background = hpRatio > 0.5 ? '#44dd44' : hpRatio > 0.25 ? '#dddd44' : '#dd3333';
    document.getElementById('hpText').textContent = `${hero.hp}/${hero.maxHp}`;

    // MP バー
    const mpFill = document.getElementById('mpBarFill');
    mpFill.style.width = `${Math.round(hero.mp / hero.maxMp * 100)}%`;
    document.getElementById('mpText').textContent = `${hero.mp}/${hero.maxMp}`;

    // 現在地（街にいるときだけ表示）
    const curTile = currentMap[hero.y] && currentMap[hero.y][hero.x];
    const inTown  = currentMap === townMap || curTile === T.STONE || curTile === T.HOUSE;
    document.getElementById('locationLabel').textContent = currentMap === dungeonMap ? '◆ くらやみの洞窟' : inTown ? '★ ヒカリのまち' : '';
  }

  function loop() {
    ctx.clearRect(0, 0, VIEW_W, VIEW_H);
    updateMove();
    updateStatusBar();
    // TALK 状態はマップを下地として描いたうえで会話ウィンドウを重ねる
    if (state === S.MAP  || state === S.TALK || state === S.EQUIP) renderMap();
    if (state === S.TALK)   renderTalkWindow();
    if (state === S.EQUIP)  renderEquipMenu();
    if (state === S.BATTLE) renderBattle();
    if (state === S.WIN)    renderWin();
    if (state === S.LOSE)   renderLose();
    requestAnimationFrame(loop); // 次のフレームへ
  }

  // ============================================================
  // バトルボタンの表示・非表示
  // ============================================================
  function showBtns() {
    btnArea.innerHTML = `
      <button class="btn" onclick="doAtk()">⚔ こうげき</button>
      <button class="btn" onclick="doMagic()">✨ ファイア (MP2)</button>
      <button class="btn" onclick="doPotion()">ポーション</button>
      <button class="btn" onclick="doRun()">💨 にげる</button>
    `;
  }
  function hideBtns() {
    btnArea.innerHTML = '';
  }

  function showShopBtns() {
    btnArea.innerHTML = `
      <button class="btn" onclick="buyPotion()">ポーション 10G</button>
      <button class="btn" onclick="buySteelSword()">鋼の剣 30G</button>
      <button class="btn" onclick="buyIronArmor()">鉄のよろい 40G</button>
      <button class="btn" onclick="advanceDialogue()">とじる</button>
    `;
  }

  function buyPotion() {
    if (state !== S.TALK || !isShopAvailable()) return;
    if (hero.gold < 10) {
      shopMsg = 'ゴールドが足りない！';
      return;
    }
    hero.gold -= 10;
    hero.potions++;
    shopMsg = `ポーションを買った！ 所持数 ${hero.potions}`;
  }

  function buySteelSword() {
    if (state !== S.TALK || !isShopAvailable()) return;
    if (hero.weaponsOwned.includes('steelSword')) {
      shopMsg = '鋼の剣は　もう持っている！';
      return;
    }
    if (hero.gold < 30) {
      shopMsg = 'ゴールドが足りない！';
      return;
    }
    hero.gold -= 30;
    hero.weaponsOwned.push('steelSword');
    shopMsg = '鋼の剣を買った！';
  }

  function buyIronArmor() {
    if (state !== S.TALK || !isShopAvailable()) return;
    if (hero.armorsOwned.includes('ironArmor')) {
      shopMsg = '鉄のよろいは　もう持っている！';
      return;
    }
    if (hero.gold < 40) {
      shopMsg = 'ゴールドが足りない！';
      return;
    }
    hero.gold -= 40;
    hero.armorsOwned.push('ironArmor');
    shopMsg = '鉄のよろいを買った！';
  }

  // ============================================================
  // 会話（トーク）システム
  // ============================================================

  // 会話を開始する
  function openDialogue(npc) {
    if (currentHouseId === 'inn' && npc.inn) {
      hero.hp = hero.maxHp;
      hero.mp = hero.maxMp;
    }
    if (currentHouseId === 'shop' && npc.shop) shopMsg = '';
    if (npc.quest) questRewardMsg = '';
    talkNpc  = npc;
    talkPage = 0;
    state    = S.TALK;
    hideBtns();
    if (currentHouseId === 'shop' && npc.shop) showShopBtns();
  }

  // セリフを1ページ進める（最終ページなら会話終了）
  function advanceDialogue() {
    if (!talkNpc) return;
    talkPage++;
    const lineCount = talkNpc.afterBossLines && bossDefeated ? talkNpc.afterBossLines.length : (talkNpc.inn || talkNpc.quest) ? 1 : talkNpc.lines.length;
    if (talkPage >= lineCount) {
      talkNpc  = null;
      talkPage = 0;
      state    = S.MAP;
      hideBtns();
    }
  }

  // 会話ウィンドウをマップの上に重ねて描画する
  function renderTalkWindow() {
    if (!talkNpc) return;
    ctx.save();
    ctx.scale(VIEW_W / 512, VIEW_H / 384); // UI は 512×384 座標で記述 → 2倍表示

    // 半透明の背景ボックス
    ctx.fillStyle = 'rgba(4,4,28,0.95)';
    ctx.fillRect(8, 246, 496, 130);
    ctx.strokeStyle = '#8888cc';
    ctx.lineWidth = 2;
    ctx.strokeRect(8, 246, 496, 130);

    // NPC スプライト（小さく左端に表示）
    drawNPC(16, 254, 1, talkNpc.bodyCol, talkNpc.hairCol);

    // NPC 名前
    txt(talkNpc.name, 60, 272, '#ffd700', 14);

    let talkLines = talkNpc.lines;
    if (talkNpc.afterBossLines && bossDefeated) {
      talkLines = talkNpc.afterBossLines;
    } else if (isShopAvailable()) {
      talkLines = [shopMsg || 'ポーションは10G、鋼の剣は30G、鉄のよろいは40Gです'];
    } else if (talkNpc.inn) {
      talkLines = ['HPとMPが回復した！'];
    } else if (talkNpc.quest) {
      if (slimeKills >= 3) {
        if (!questDone) {
          const leveled = gainExp(5);
          questDone = true;
          questRewardMsg = leveled ? 'ありがとう！ 経験値を5獲得した！ レベルアップ！' : 'ありがとう！ 経験値を5獲得した！';
          talkLines = [questRewardMsg];
        } else if (questRewardMsg) {
          talkLines = [questRewardMsg];
        } else {
          talkLines = ['ありがとう！'];
        }
      } else {
        talkLines = ['スライムを3匹倒してきて'];
      }
    }

    // ページ番号
    txt(`${talkPage + 1}/${talkLines.length}`, 466, 272, '#666688', 11);

    // 区切り線
    ctx.fillStyle = '#4444aa';

    // セリフ（現在ページ）
    txt(talkLines[talkPage], 60, 306, '#ffffff', 14);

    // ページ送りプロンプト（点滅）
    if (Math.floor(Date.now() / 450) % 2) {
      const isLast = talkPage >= talkLines.length - 1;
      txt(isLast ? '[ とじる ]' : '[ つぎへ  ]', 376, 368, '#88aaff', 12);

  // ============================================================
  // バトル開始
  // ============================================================
  function chooseEnemy() {
    const enemies = currentMap === dungeonMap ? [BAT_BASE, GOBLIN_BASE] : [SLIME_BASE, BAT_BASE];
    return { ...enemies[rng(0, enemies.length - 1)] };
  }

  function startBattle() {
    battleBgType = currentMap === dungeonMap ? 'dungeon' : 'field';
    foe      = chooseEnemy(); // マップに応じて敵を生成
    state    = S.BATTLE;
    heroTurn = true;
    msg      = `${foe.name} が　あらわれた！`;
    hideBtns();
    setTimeout(showBtns, 700); // 少し間を置いてからボタン表示
  }

  function startBossBattle() {
    if (bossDefeated) return;
    battleBgType = 'boss';
    foe      = { ...DARK_KNIGHT_BASE };
    state    = S.BATTLE;
    heroTurn = true;
    msg      = `${foe.name} が　立ちはだかった！`;
    hideBtns();
    setTimeout(showBtns, 700);
  }

  // ============================================================
  // プレイヤーの行動：こうげき
  // ============================================================
  function doAtk() {
    if (!heroTurn || state !== S.BATTLE) return;
    hideBtns();
    const dmg = Math.max(1, getHeroAttack() - foe.def + rng(-1, 3));
    foe.hp    = Math.max(0, foe.hp - dmg);
    msg       = `ゆうしゃの　こうげき！　${dmg} のダメージ！`;
    afterHeroAction();
  }

  // ============================================================
  // プレイヤーの行動：ファイア（まほう）
  // ============================================================
  function doMagic() {
    if (!heroTurn || state !== S.BATTLE) return;
    if (hero.mp < 2) {
      msg = 'MPが　たりない！';
      return;
    }
    hideBtns();
    hero.mp -= 2;
    const dmg = Math.max(1, getHeroAttack() * 2 - foe.def + rng(0, 5));
    foe.hp    = Math.max(0, foe.hp - dmg);
    msg       = `ファイア！　${dmg} のダメージ！`;
    afterHeroAction();
  }

  // ============================================================
  // プレイヤーの行動：ポーション
  // ============================================================
  function doPotion() {
    if (!heroTurn || state !== S.BATTLE) return;
    if (hero.potions <= 0) {
      msg = 'ポーションを持っていない！';
      return;
    }
    hideBtns();
    hero.potions--;
    const beforeHp = hero.hp;
    hero.hp = Math.min(hero.maxHp, hero.hp + 15);
    msg = `ポーションを使った！ HPが ${hero.hp - beforeHp} 回復した！`;
    heroTurn = false;
    setTimeout(enemyTurn, 1300);
  }

  // ============================================================
  // プレイヤーの行動：にげる
  // ============================================================
  function doRun() {
    if (!heroTurn || state !== S.BATTLE) return;
    if (foe && foe.boss) {
      msg = 'ダークナイトからは　にげられない！';
      return;
    }
    hideBtns();
    if (Math.random() < 0.6) {
      msg = 'うまく　にげきった！';
      setTimeout(() => { state = S.MAP; }, 1000);
    } else {
      msg      = 'にげられなかった！';
      heroTurn = false;
      setTimeout(enemyTurn, 1300);
    }
  }

  // ============================================================
  // プレイヤー行動後の処理（敵が生きているか確認）
  // ============================================================
  function afterHeroAction() {
    if (foe.hp <= 0) {
      // 勝利！
      setTimeout(() => {
        if (foe.name === 'スライム') slimeKills++;
        const leveled = gainExp(foe.exp);
        hero.gold += foe.gold || 0;
        if (foe.boss) {
          bossDefeated = true;
          winMsg = leveled ? 'ダークナイトを倒した！ レベルアップ！' : 'ダークナイトを倒した！';
        } else {
          winMsg = leveled ? `${foe.exp} けいけんちと ${foe.gold || 0}Gを　えた！ レベルアップ！` : `${foe.exp} けいけんちと ${foe.gold || 0}Gを　えた！`;
        }
        state    = S.WIN;
      }, 900);
    } else {
      // 敵のターンへ
      heroTurn = false;
      setTimeout(enemyTurn, 1300);
    }
  }

  // ============================================================
  // 敵のターン（自動で攻撃してくる）
  // ============================================================
  function enemyTurn() {
    if (state !== S.BATTLE) return;
    const dmg = Math.max(1, foe.atk - getHeroDefense() + rng(-1, 3));
    hero.hp   = Math.max(0, hero.hp - dmg);
    msg       = `${foe.name}の　こうげき！　${dmg} のダメージ！`;
    if (hero.hp <= 0) {
      // ゲームオーバー
      setTimeout(() => { state = S.LOSE; }, 1000);
    } else {
      // プレイヤーのターンへ戻る
      heroTurn = true;
      setTimeout(() => {
        msg = 'どうする？';
        showBtns();
      }, 1300);
    }
  }

  // ============================================================
  // プレイヤーの移動
  // ============================================================
  function isFieldTownEntrance(x, y) {
    return currentMap === fieldMap && x === 10 && y === 2;
  }

  function isTownExit(x, y) {
    return currentMap === townMap && x === 7 && y === 10;
  }

  function isFieldDungeonEntrance(x, y) {
    return currentMap === fieldMap && x === 13 && y === 10;
  }

  function isDungeonExit(x, y) {
    return currentMap === dungeonMap && x === 7 && y === 11;
  }

  function isHouseMap(map) {
    return Object.values(houseMaps).includes(map);
  }

  function getHouseIdAt(x, y) {
    return HOUSE_ENTRANCES[`${x},${y}`] || null;
  }

  function isHouseExit(x, y) {
    return isHouseMap(currentMap) && x === 7 && y === 10;
  }

  function switchMapIfNeeded() {
    if (isFieldTownEntrance(hero.x, hero.y)) {
      townReturn = { x: 9, y: 2 };
      currentMap = townMap;
      hero.x = 7;
      hero.y = 9;
      return true;
    }
    if (isFieldDungeonEntrance(hero.x, hero.y)) {
      dungeonReturn = { x: 13, y: 10 };
      currentMap = dungeonMap;
      hero.x = 7;
      hero.y = 10;
      return true;
    }
    if (isTownExit(hero.x, hero.y)) {
      currentMap = fieldMap;
      hero.x = townReturn.x;
      hero.y = townReturn.y;
      return true;
    }
    if (isDungeonExit(hero.x, hero.y)) {
      currentMap = fieldMap;
      hero.x = dungeonReturn.x;
      hero.y = dungeonReturn.y;
      return true;
    }
    if (isHouseExit(hero.x, hero.y)) {
      currentMap = townMap;
      hero.x = houseReturn.x;
      hero.y = houseReturn.y;
      currentHouseId = null;
      return true;
    }
    return false;
  }

  function checkTreasureEvent() {
    if (currentMap !== dungeonMap || currentMap[hero.y][hero.x] !== T.CHEST || chestOpened) return;
    chestOpened = true;
    if (!hero.weaponsOwned.includes('ironSword')) hero.weaponsOwned.push('ironSword');
    showNotice('鉄の剣を手に入れた！ Eキーで装備できます');
  }

  function isBossAt(x, y) {
    return currentMap === dungeonMap && !bossDefeated && x === BOSS_POS.x && y === BOSS_POS.y;
  }

  function getAdjacentBoss() {
    for (const [dx, dy] of [[0,-1],[0,1],[-1,0],[1,0]]) {
      if (isBossAt(hero.x + dx, hero.y + dy)) return true;
    }
    return false;
  }

  function move(dx, dy) {
    if (moveAnim.active || state !== S.MAP) return; // 移動中・マップ以外は動かない
    if (dy < 0) hero.dir = 'up';
    if (dy > 0) hero.dir = 'down';
    if (dx < 0) hero.dir = 'left';
    if (dx > 0) hero.dir = 'right';

    const nx = hero.x + dx;
    const ny = hero.y + dy;

    // マップの端を超えないようにする
    if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS) return;

    // 移動先にNPCがいれば、移動せずに話しかける
    const npc = getNpcAt(nx, ny);
    if (npc) {
      openDialogue(npc);
      return;
    }
    if (isBossAt(nx, ny)) {
      startBossBattle();
      return;
    }

    // 木・水・建物は通れない
    const tile = currentMap[ny][nx];
    const houseId = currentMap === townMap && tile === T.HOUSE ? getHouseIdAt(nx, ny) : null;
    if (houseId && houseMaps[houseId]) {
      houseReturn = { x: hero.x, y: hero.y };
      currentHouseId = houseId;
      currentMap = houseMaps[houseId];
      hero.x = 7;
      hero.y = 9;
      snapDrawPos(); // マップ切り替えはアニメなしでスナップ
      return;
    }
    if (tile === T.TREE || tile === T.WATER || tile === T.HOUSE) return;

    const oldX = hero.x, oldY = hero.y;
    hero.x = nx;
    hero.y = ny;
    const switchedMap = switchMapIfNeeded();
    checkTreasureEvent();

    if (switchedMap) {
      snapDrawPos(); // マップ切り替えはアニメなしでスナップ
    } else {
      // 移動補間アニメーション開始
      moveAnim.active   = true;
      moveAnim.startX   = oldX;
      moveAnim.startY   = oldY;
      moveAnim.progress = 0;
    }

    // ランダムエンカウント判定（草・花タイルのみ。石畳の街ではエンカウントなし）
    if (!switchedMap && currentMap === fieldMap && (tile === T.GRASS || tile === T.FLOWER) && Math.random() < ENC_RATE) {
      setTimeout(startBattle, 80);
    }
    if (!switchedMap && currentMap === dungeonMap && tile === T.STONE && Math.random() < ENC_RATE) {
      setTimeout(startBattle, 80);
    }
  }

  function showNotice(text) {
    const notification = document.getElementById('notification');
    notification.textContent = text;
    setTimeout(() => {
      if (notification.textContent === text) notification.textContent = '';
    }, 1800);
  }

  function saveGame() {
    const data = {
      hero: {
        x: hero.x, y: hero.y,
        hp: hero.hp, maxHp: hero.maxHp,
        mp: hero.mp, maxMp: hero.maxMp,
        atk: hero.atk, def: hero.def,
        weapon: hero.weapon,
        armor: hero.armor,
        weaponsOwned: hero.weaponsOwned,
        armorsOwned: hero.armorsOwned,
        level: hero.level, exp: hero.exp,
        gold: hero.gold, potions: hero.potions,
        dir: hero.dir,
      },
      quest: {
        slimeKills,
        questDone,
        questRewardMsg,
      },
      chestOpened,
      bossDefeated,
      returns: {
        town: townReturn,
        dungeon: dungeonReturn,
        house: houseReturn,
      },
      houseId: currentHouseId,
      map: currentMap === townMap ? 'town' : currentMap === dungeonMap ? 'dungeon' : isHouseMap(currentMap) ? 'house' : 'field',
    };
    localStorage.setItem(SAVE_KEY, JSON.stringify(data));
    showNotice('セーブしました');
  }

  function loadGame() {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) {
      showNotice('セーブデータがありません');
      return;
    }
    try {
      const data = JSON.parse(raw);
      if (data.hero) Object.assign(hero, data.hero);
      if (!WEAPONS[hero.weapon]) hero.weapon = 'woodSword';
      if (!ARMORS[hero.armor]) hero.armor = 'travelerClothes';
      hero.weaponsOwned = Array.isArray(hero.weaponsOwned) ? hero.weaponsOwned.filter(id => WEAPONS[id]) : ['woodSword'];
      hero.armorsOwned = Array.isArray(hero.armorsOwned) ? hero.armorsOwned.filter(id => ARMORS[id]) : ['travelerClothes'];
      if (!hero.weaponsOwned.includes('woodSword')) hero.weaponsOwned.unshift('woodSword');
      if (!hero.armorsOwned.includes('travelerClothes')) hero.armorsOwned.unshift('travelerClothes');
      if (!hero.weaponsOwned.includes(hero.weapon)) hero.weaponsOwned.push(hero.weapon);
      if (!hero.armorsOwned.includes(hero.armor)) hero.armorsOwned.push(hero.armor);
      hero.dir = hero.dir || 'down';
      if (data.quest) {
        slimeKills = data.quest.slimeKills || 0;
        questDone = !!data.quest.questDone;
        questRewardMsg = data.quest.questRewardMsg || '';
      }
      chestOpened = !!data.chestOpened;
      bossDefeated = !!data.bossDefeated;
      if (data.returns) {
        townReturn = data.returns.town || townReturn;
        dungeonReturn = data.returns.dungeon || dungeonReturn;
        houseReturn = data.returns.house || houseReturn;
      } else if (data.fieldReturn) {
        townReturn = data.fieldReturn;
        dungeonReturn = data.fieldReturn;
      }
      currentHouseId = data.houseId && houseMaps[data.houseId] ? data.houseId : null;
      if (data.map === 'house' && !currentHouseId) currentHouseId = 'west';
      currentMap = data.map === 'town' ? townMap : data.map === 'dungeon' ? dungeonMap : data.map === 'house' ? houseMaps[currentHouseId] : fieldMap;
      state = S.MAP;
      foe = null;
      talkNpc = null;
      talkPage = 0;
      equipCursor = 0;
      snapDrawPos();
      hideBtns();
      showNotice('ロードしました');
    } catch (e) {
      showNotice('ロードに失敗しました');
    }
  }

  // ============================================================
  // キーボード入力
  // ============================================================
  document.addEventListener('keydown', e => {
    if (e.shiftKey && (e.key === 's' || e.key === 'S')) {
      e.preventDefault();
      saveGame();
      return;
    }
    if (e.shiftKey && (e.key === 'l' || e.key === 'L')) {
      e.preventDefault();
      loadGame();
      return;
    }
    if (state === S.MAP) {
      if (e.key === 'e' || e.key === 'E') {
        e.preventDefault();
        equipCursor = 0;
        state = S.EQUIP;
        return;
      }
      if (e.key === 'ArrowUp'    || e.key === 'w') move(0, -1);
      if (e.key === 'ArrowDown'  || e.key === 's') move(0,  1);
      if (e.key === 'ArrowLeft'  || e.key === 'a') move(-1, 0);
      if (e.key === 'ArrowRight' || e.key === 'd') move( 1, 0);
      // Space・Enter・Z で隣接NPCに話しかける
      if (e.key === ' ' || e.key === 'Enter' || e.key === 'z' || e.key === 'Z') {
        e.preventDefault();
        const adj = getAdjacentNpc();
        if (adj) {
          openDialogue(adj);
        } else if (getAdjacentBoss()) {
          startBossBattle();
        }
      }
    } else if (state === S.EQUIP) {
      const items = getEquipItems();
      if (e.key === 'Escape' || e.key === 'e' || e.key === 'E') {
        e.preventDefault();
        state = S.MAP;
        return;
      }
      if (e.key === 'ArrowUp') {
        e.preventDefault();
        equipCursor = items.length ? (equipCursor + items.length - 1) % items.length : 0;
        return;
      }
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        equipCursor = items.length ? (equipCursor + 1) % items.length : 0;
        return;
      }
      if (e.key === 'Enter') {
        e.preventDefault();
        const entry = items[equipCursor];
        if (entry) {
          if (entry.type === 'weapon') hero.weapon = entry.id;
          if (entry.type === 'armor') hero.armor = entry.id;
          updateStatusBar();
        }
        return;
      }
    } else if (state === S.TALK) {
      // Space・Enter・Z・Escape でセリフを進める／会話を閉じる
      if (e.key === ' ' || e.key === 'Enter' || e.key === 'z' || e.key === 'Z'
          || e.key === 'Escape') {
        e.preventDefault();
        advanceDialogue();
      }
    } else if (state === S.WIN) {
      backToMap();
    } else if (state === S.LOSE) {
      resetGame();
    }
  });

  // キャンバスをクリックしても勝利・ゲームオーバー画面を進められる
  canvas.addEventListener('click', () => {
    if (state === S.TALK) advanceDialogue();
    if (state === S.WIN)  backToMap();
    if (state === S.LOSE) resetGame();
  });

  // マップへ戻る
  function backToMap() {
    state = S.MAP;
    foe   = null;
    hideBtns();
  }

  // ゲームをリセット（最初から）
  function resetGame() {
    hero.hp = hero.maxHp;
    hero.mp = hero.maxMp;
    hero.x  = 1;
    hero.y  = 1;
    hero.dir = 'down';
    snapDrawPos();
    hero.gold = 0;
    hero.potions = 0;
    chestOpened = false;
    bossDefeated = false;
    townReturn = { x: 9, y: 2 };
    dungeonReturn = { x: 13, y: 10 };
    houseReturn = { x: 7, y: 4 };
    currentHouseId = null;
    currentMap = fieldMap;
    state   = S.MAP;
    foe     = null;
    hideBtns();
  }

  // ============================================================
  // ゲーム開始！
  // ============================================================
  loadTileImages();   // tiles/ フォルダの画像を非同期ロード開始
  loadSpriteImages(); // sprites/ フォルダの画像を非同期ロード開始
  loop();             // ロード完了を待たずに開始（ロード前は fillRect で描画）
  </script>
</body>
</html>
