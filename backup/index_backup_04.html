        equippedWeapon: a.equippedWeapon,
        equippedArmor:  a.equippedArmor,
        flags:   { ...a.flags },
      })),
    };
    localStorage.setItem(SAVE_KEY, JSON.stringify(data));
    showNotice('セーブしました');
  }

  function loadGame() {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) {
      setStartPosition();
      setGameState(GameState.MAP);
      foe = null;
      battleEnemies = [];
      battleTurnQueue = [];
      battleTargetMode = null;
      selectedTargetIndex = 0;
      clearBattleIntro();
    talkNpc = null;
      talkPage = 0;
      activeSign = null;
      readPage = 0;
      equipCursor = 0;
      equipMenuMode = 'main';
      equipCharacterIndex = 0;
      charaTabIndex = 0;
      equipSlotCursor = 0;
      itemCursor = 0;
      itemUseId = 'potion';
      itemTargetIndex = 0;
      shopCursor = 0;
      hideBtns();
      showNotice('セーブデータがありません');
      return;
    }
    try {
      const data = JSON.parse(raw);
      if (data.hero) Object.assign(hero, data.hero);
      hero.speed = hero.speed ?? 10;
      hero.potions = hero.potions ?? 0;
      ensureInventory();
      if (data.coordVersion !== 2) {
        const p = normalizeSavedPoint({ x: hero.x, y: hero.y }, { x: tileToPx(1), y: tileToPx(1) });
        hero.x = p.x;
        hero.y = p.y;
      }
      if (!WEAPONS[hero.weapon]) hero.weapon = 'woodSword';
      if (!ARMORS[hero.armor]) hero.armor = 'travelerClothes';
      if (!isItemAllowedForActor(WEAPONS[hero.weapon], 'hero')) hero.weapon = 'woodSword';
      if (!isItemAllowedForActor(ARMORS[hero.armor], 'hero')) hero.armor = 'travelerClothes';
      hero.weaponsOwned = Array.isArray(hero.weaponsOwned) ? hero.weaponsOwned.filter(id => WEAPONS[id]) : ['woodSword'];
      hero.armorsOwned = Array.isArray(hero.armorsOwned) ? hero.armorsOwned.filter(id => ARMORS[id]) : ['travelerClothes'];
      if (!hero.weaponsOwned.includes('woodSword')) hero.weaponsOwned.unshift('woodSword');
      if (!hero.armorsOwned.includes('travelerClothes')) hero.armorsOwned.unshift('travelerClothes');
      if (!hero.weaponsOwned.includes(hero.weapon)) hero.weaponsOwned.push(hero.weapon);
      if (!hero.armorsOwned.includes(hero.armor)) hero.armorsOwned.push(hero.armor);
      setHeroDirection(hero.direction || hero.dir || 'down');
      hero.walkFrame = HERO_WALK_IDLE_FRAME;
      hero.walkTimer = 0;
      hero.vx = 0;
      hero.vy = 0;
      if (data.quest) {
        slimeKills = data.quest.slimeKills || 0;
        questDone = !!data.quest.questDone;
        questRewardMsg = data.quest.questRewardMsg || '';
      }
      // flags（後方互換: 旧セーブの bossDefeated/chestOpened も読み込む）
      if (data.flags) {
        Object.assign(flags, data.flags);
        if (flags.outpostQuestDone) flags.talkedToOldBlacksmith = true;
      } else {
        flags.defeatedDarkKnight = !!data.bossDefeated;
        flags.chest1Opened = !!data.chestOpened;
      }
      if (data.returns) {
        townReturn = normalizeSavedPoint(data.returns.town, townReturn);
        dungeonReturn = normalizeSavedPoint(data.returns.dungeon, dungeonReturn);
        houseReturn = normalizeSavedPoint(data.returns.house, houseReturn);
        if (data.returns.field2) field2Return = normalizeSavedPoint(data.returns.field2, field2Return);
        if (data.returns.shadowTown) shadowTownReturn = normalizeSavedPoint(data.returns.shadowTown, shadowTownReturn);
        if (data.returns.cursedForest) cursedForestReturn = normalizeSavedPoint(data.returns.cursedForest, cursedForestReturn);
        if (data.returns.outpost) outpostReturn = normalizeSavedPoint(data.returns.outpost, outpostReturn);
        if (data.returns.castle) castleReturn = normalizeSavedPoint(data.returns.castle, castleReturn);
      } else if (data.fieldReturn) {
        townReturn = normalizeSavedPoint(data.fieldReturn, townReturn);
        dungeonReturn = normalizeSavedPoint(data.fieldReturn, dungeonReturn);
      }
      currentHouseId = data.houseId && houseMaps[data.houseId] ? data.houseId : null;
      if (typeof data.map === 'string' && data.map.startsWith('house:')) {
        const savedHouseId = data.map.slice('house:'.length);
        if (houseMaps[savedHouseId]) currentHouseId = savedHouseId;
      }
      if (data.map === 'house' && !currentHouseId) currentHouseId = 'west';
      currentMap = typeof data.map === 'string' && data.map.startsWith('house:') && currentHouseId
        ? houseMaps[currentHouseId]
        : data.map === 'house' ? houseMaps[currentHouseId]
        : getMapTilesById(data.map);
      if (isHouseMap(currentMap) && (heroTileX() < 0 || heroTileX() >= mapCols() || heroTileY() < 0 || heroTileY() >= mapRows())) {
        hero.x = tileToPx(3);
        hero.y = tileToPx(4);
      }
      // 仲間データを復元
      allies = [];
      if (Array.isArray(data.allies)) {
        for (const saved of data.allies) {
          if (saved.id === 'mia') saved.id = 'leafa';
          const def = ALLY_DEFS[saved.id];
          if (def) {
            const ally = {
              ...def,
              weaponsOwned: Array.isArray(def.weaponsOwned) ? [...def.weaponsOwned] : [],
              armorsOwned: Array.isArray(def.armorsOwned) ? [...def.armorsOwned] : [],
              flags: { ...def.flags, hasAlly: true },
            };
            if (typeof saved.hp      === 'number') ally.hp      = saved.hp;
            if (typeof saved.maxHp   === 'number') ally.maxHp   = saved.maxHp;
            if (typeof saved.mp      === 'number') ally.mp      = saved.mp;
            if (typeof saved.maxMp   === 'number') ally.maxMp   = saved.maxMp;
            if (typeof saved.level   === 'number') ally.level   = saved.level;
            if (typeof saved.exp     === 'number') ally.exp     = saved.exp;
            if (typeof saved.baseAtk === 'number') ally.baseAtk = saved.baseAtk;
            if (typeof saved.baseDef === 'number') ally.baseDef = saved.baseDef;
            if (typeof saved.baseSpeed === 'number') ally.baseSpeed = saved.baseSpeed;
            if (Array.isArray(saved.weaponsOwned)) ally.weaponsOwned = saved.weaponsOwned.filter(id => WEAPONS[id] && isItemAllowedForActor(WEAPONS[id], 'leafa'));
            if (Array.isArray(saved.armorsOwned)) ally.armorsOwned = saved.armorsOwned.filter(id => ARMORS[id] && isItemAllowedForActor(ARMORS[id], 'leafa'));
            if (saved.equippedWeapon && WEAPONS[saved.equippedWeapon]) ally.equippedWeapon = saved.equippedWeapon;
            if (saved.equippedArmor && ARMORS[saved.equippedArmor]) ally.equippedArmor = saved.equippedArmor;
            if (saved.flags) Object.assign(ally.flags, saved.flags);
            if (!isItemAllowedForActor(WEAPONS[ally.equippedWeapon], ally.id) && ally.weaponsOwned.length) ally.equippedWeapon = ally.weaponsOwned[0];
            if (!isItemAllowedForActor(ARMORS[ally.equippedArmor], ally.id) && ally.armorsOwned.length) ally.equippedArmor = ally.armorsOwned[0];
            allies.push(ally);
          }
        }
      }
      // 旧セーブ互換：仲間にリーファがいれば加入フラグを立てる
      if (allies.some(a => a.id === 'leafa' && a.flags && a.flags.hasAlly)) {
        flags.leafaJoined = true;
        flags.leafaRescueDone = true;
      }
      setGameState(GameState.MAP);
      foe = null;
      battleEnemies       = [];
      battleTurnQueue     = [];
      pendingPartyActions = [];
      battlePartyQueue    = [];
      battleCommandActor  = null;
      battleTargetMode    = null;
      selectedTargetIndex = 0;
      clearBattleIntro();
      talkNpc = null;
      talkPage = 0;
      activeSign = null;
      readPage = 0;
      equipCursor = 0;
      equipMenuMode = 'main';
      equipCharacterIndex = 0;
      charaTabIndex = 0;
      equipSlotCursor = 0;
      itemCursor = 0;
      itemUseId = 'potion';
      itemTargetIndex = 0;
      shopCursor = 0;
      snapDrawPos();
      hideBtns();
      showNotice('ロードしました');
    } catch (e) {
      showNotice('ロードに失敗しました');
    }
  }

  // ============================================================
  // キーボード入力
  // ============================================================
  document.addEventListener('keydown', e => {
    if (e.shiftKey && (e.key === 's' || e.key === 'S')) {
      e.preventDefault();
      saveGame();
      return;
    }
    if (e.shiftKey && (e.key === 'l' || e.key === 'L')) {
      e.preventDefault();
      loadGame();
      return;
    }
    if (currentState === GameState.TITLE) {
      handleTitleInput(e);
      return;
    }
    if (currentState === GameState.PROLOGUE) {
      if (e.key === 'Escape' || e.key === 'x' || e.key === 'X') {
        e.preventDefault();
        skipPrologue();
      } else if (e.key === ' ' || e.key === 'Enter' || e.key === 'z' || e.key === 'Z') {
        e.preventDefault();
        if (!prologueState.cooldown) advancePrologueLine();
      }
      return;
    }
    if (currentState === GameState.MAP) {
      if (e.key === 'e' || e.key === 'E') {
        e.preventDefault();
        equipCursor = 0;
        equipMenuMode = 'main';
        equipCharacterIndex = 0;
        charaTabIndex = 0;
        equipSlotCursor = 0;
        itemCursor = 0;
        itemUseId = 'potion';
        itemTargetIndex = 0;
        setGameState(GameState.EQUIP);
        return;
      }
      if (e.key === 'ArrowUp'    || e.key === 'w') { e.preventDefault(); keys.up = true; }
      if (e.key === 'ArrowDown'  || e.key === 's') { e.preventDefault(); keys.down = true; }
      if (e.key === 'ArrowLeft'  || e.key === 'a') { e.preventDefault(); keys.left = true; }
      if (e.key === 'ArrowRight' || e.key === 'd') { e.preventDefault(); keys.right = true; }
      // Space・Enter・Z で隣接した対象に話しかける/調べる
      if (e.key === ' ' || e.key === 'Enter' || e.key === 'z' || e.key === 'Z') {
        e.preventDefault();
        const adj = getAdjacentInteractable();
        if (adj) {
          adj.interact();
        } else {
          const boss = getAdjacentBoss();
          if (boss) boss.interact();
        }
      }
    } else if (currentState === GameState.EQUIP) {
      if (e.key === 'Escape' || e.key === 'x' || e.key === 'X') {
        e.preventDefault();
        if (equipMenuMode === 'equip_slot') { equipMenuMode = 'chara'; return; }
        if (equipMenuMode === 'chara' || equipMenuMode === 'items') { equipMenuMode = 'main'; equipCursor = 0; return; }
        if (equipMenuMode === 'itemTarget') { equipMenuMode = 'items'; return; }
        setGameState(GameState.MAP);
        return;
      }
      if (e.key === 'e' || e.key === 'E') {
        e.preventDefault();
        setGameState(GameState.MAP);
        return;
      }
      if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (equipMenuMode === 'main')        equipCursor      = (equipCursor + 1) % 2;
        else if (equipMenuMode === 'chara')  charaTabIndex    = (charaTabIndex + 1) % 2;
        else if (equipMenuMode === 'equip_slot') equipSlotCursor = (equipSlotCursor + 1) % 2;
        else if (equipMenuMode === 'items') {
          const items = getUsableItems();
          itemCursor = items.length ? (itemCursor + items.length - 1) % items.length : 0;
        }
        else if (equipMenuMode === 'itemTarget') {
          const members = getPartyMembers({ aliveOnly: true });
          itemTargetIndex = members.length ? (itemTargetIndex + members.length - 1) % members.length : 0;
        }
        return;
      }
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        if (equipMenuMode === 'main')        equipCursor      = (equipCursor + 1) % 2;
        else if (equipMenuMode === 'chara')  charaTabIndex    = (charaTabIndex + 1) % 2;
        else if (equipMenuMode === 'equip_slot') equipSlotCursor = (equipSlotCursor + 1) % 2;
        else if (equipMenuMode === 'items') {
          const items = getUsableItems();
          itemCursor = items.length ? (itemCursor + 1) % items.length : 0;
        }
        else if (equipMenuMode === 'itemTarget') {
          const members = getPartyMembers({ aliveOnly: true });
          itemTargetIndex = members.length ? (itemTargetIndex + 1) % members.length : 0;
        }
        return;
      }
      if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
        e.preventDefault();
        const delta = e.key === 'ArrowLeft' ? -1 : 1;
        if (equipMenuMode === 'chara' || equipMenuMode === 'equip_slot') {
          const members = getPartyMembers();
          equipCharacterIndex = members.length ? (equipCharacterIndex + members.length + delta) % members.length : 0;
          if (equipMenuMode === 'equip_slot') equipSlotCursor = 0;
        } else if (equipMenuMode === 'itemTarget') {
          const members = getPartyMembers({ aliveOnly: true });
          itemTargetIndex = members.length ? (itemTargetIndex + members.length + delta) % members.length : 0;
        } else if (equipMenuMode === 'main') {
          equipCursor = (equipCursor + 1) % 2;
        }
        return;
      }
      if (e.key === 'Enter' || e.key === ' ' || e.key === 'z' || e.key === 'Z') {
        e.preventDefault();
        if (equipMenuMode === 'main') {
          if (equipCursor === 0) {
            equipMenuMode = 'chara';
            charaTabIndex = 0;
            equipCharacterIndex = 0;
          } else {
            equipMenuMode = 'items';
            itemCursor = 0;
            itemUseId = 'potion';
            itemTargetIndex = 0;
          }
          return;
        }
        if (equipMenuMode === 'chara') {
          if (charaTabIndex === 0) {
            equipMenuMode = 'equip_slot';
            equipSlotCursor = 0;
          }
          return;
        }
        if (equipMenuMode === 'equip_slot') {
          const member = getPartyMembers()[equipCharacterIndex];
          if (member && member.actor) {
            const changed = cycleActorEquipment(member.actor, equipSlotCursor === 0 ? 'weapon' : 'armor', 1);
            if (!changed) showNotice('装備できるものがない！');
          } else {
            showNotice('装備できるものがない！');
          }
          updateStatusBar();
          return;
        }
        if (equipMenuMode === 'items') {
          const selectedItem = getUsableItems()[itemCursor] || ITEMS.potion;
          if (getItemCount(selectedItem.id) <= 0) {
            showNotice(`${selectedItem.name}を持っていない！`);
          } else {
            equipMenuMode = 'itemTarget';
            itemUseId = selectedItem.id;
            itemTargetIndex = 0;
          }
          return;
        }
        if (equipMenuMode === 'itemTarget') {
          const members = getPartyMembers({ aliveOnly: true });
          const member = members[itemTargetIndex];
          const result = itemUseId === 'ether'
            ? useEther(member && member.actor)
            : itemUseId === 'elixir'
            ? useElixir(member && member.actor)
            : usePotionOnTarget(member && member.actor);
          showNotice(result.message);
          if (result.ok || getItemCount(itemUseId) <= 0) equipMenuMode = 'items';
          updateStatusBar();
        }
        return;
      }
    } else if (currentState === GameState.BATTLE) {
      if (battleIntro.active && (e.key === ' ' || e.key === 'Enter' || e.key === 'z' || e.key === 'Z')) {
        e.preventDefault();
        if (!battleIntro.unskippable) skipBattleIntro();
        return;
      }
      if (battleTargetMode) {
        if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
          e.preventDefault();
          moveTargetSelection(-1);
          return;
        }
        if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
          e.preventDefault();
          moveTargetSelection(1);
          return;
        }
        if (e.key === ' ' || e.key === 'Enter' || e.key === 'z' || e.key === 'Z') {
          e.preventDefault();
          confirmTargetSelection();
          return;
        }
        if (e.key === 'Escape' || e.key === 'x' || e.key === 'X') {
          e.preventDefault();
          cancelTargetSelection();
          return;
        }
      }
      if (battleVictory.active && (e.key === ' ' || e.key === 'Enter' || e.key === 'z' || e.key === 'Z')) {
        e.preventDefault();
        advanceBattleVictory();
        return;
      }
      if (heroTurn && !battleVictory.active && !battleVictory.pending) {
        if (e.key === 'ArrowUp') {
          e.preventDefault();
          moveBattleCommand(-1);
          return;
        }
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          moveBattleCommand(1);
          return;
        }
        if (e.key === ' ' || e.key === 'Enter' || e.key === 'z' || e.key === 'Z') {
          e.preventDefault();
          confirmBattleCommand();
          return;
        }
      }
    } else if (currentState === GameState.SHOP) {
      if (e.key === 'ArrowUp') {
        e.preventDefault();
        moveShopCursor(-1);
        return;
      }
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        moveShopCursor(1);
        return;
      }
      if (e.key === ' ' || e.key === 'Enter' || e.key === 'z' || e.key === 'Z') {
        e.preventDefault();
        confirmShopChoice();
        return;
      }
      if (e.key === 'Escape' || e.key === 'x' || e.key === 'X') {
        e.preventDefault();
        closeShop();
        return;
      }
    } else if (currentState === GameState.TALK) {
      // Space・Enter・Z・Escape でセリフを進める／会話を閉じる
      if (e.key === ' ' || e.key === 'Enter' || e.key === 'z' || e.key === 'Z'
          || e.key === 'Escape') {
        e.preventDefault();
        advanceDialogue();
      }
    } else if (currentState === GameState.WIN) {
      backToMap();
    } else if (currentState === GameState.LOSE) {
      continueAfterGameOver();
    } else if (currentState === GameState.ENDING) {
      resetGame();
    }
  });

  document.addEventListener('keyup', e => {
    if (e.key === 'ArrowUp'    || e.key === 'w') keys.up = false;
    if (e.key === 'ArrowDown'  || e.key === 's') keys.down = false;
    if (e.key === 'ArrowLeft'  || e.key === 'a') keys.left = false;
    if (e.key === 'ArrowRight' || e.key === 'd') keys.right = false;
  });

  // マップへ戻る
  function backToMap() {
    setGameState(GameState.MAP);
    foe      = null;
    battleEnemies = [];
    battleTurnQueue = [];
    battleTargetMode = null;
    selectedTargetIndex = 0;
    clearBattleIntro();
    winMsg   = '';
    battleVictory = { active: false, pending: false, messages: [], index: 0 };
    fireEffects = []; leafEffects = []; slashEffects = []; hitEffects = [];
    clearBattleMessageQueue();
    hideBtns();
  }

  function recoverActorAfterGameOver(actor) {
    if (!actor) return;
    actor.hp = actor.maxHp;
    actor.mp = actor.maxMp;
    if ('isDead' in actor) actor.isDead = false;
    if ('isDying' in actor) actor.isDying = false;
    if ('guard' in actor) actor.guard = false;
    if ('statusEffects' in actor) {
      actor.statusEffects = Array.isArray(actor.statusEffects) ? [] : [];
    }
    if ('status' in actor) actor.status = null;
    if ('tempStatus' in actor) actor.tempStatus = null;
  }

  // ゲームオーバー後の復帰。成長・所持品・進行・宝箱状態は維持する。
  function continueAfterGameOver() {
    recoverActorAfterGameOver(hero);
    for (const ally of allies) {
      if (ally && ally.flags && ally.flags.hasAlly) {
        recoverActorAfterGameOver(ally);
      }
    }
    setStartPosition();
    setGameState(GameState.MAP);
    foe = null;
    battleEnemies = [];
    battleTurnQueue = [];
    battleTargetMode = null;
    selectedTargetIndex = 0;
    clearBattleIntro();
    heroTurn = true;
    currentBattleBgKey = 'field';
    winMsg = '';
    battleVictory = { active: false, pending: false, messages: [], index: 0 };
    talkNpc = null;
    talkPage = 0;
    activeSign = null;
    readPage = 0;
    fireEffects = []; leafEffects = []; slashEffects = []; hitEffects = [];
    hideBtns();
    showNotice('ヒカリのまちへ戻された…');
  }

  // ゲームをリセット（最初から）
  function resetGame() {
    hero.level = 1;
    hero.exp = 0;
    hero.maxHp = 30;
    hero.maxMp = 12;
    hero.hp = hero.maxHp;
    hero.mp = hero.maxMp;
    hero.atk = 7;
    hero.def = 0;
    hero.speed = 10;
    hero.weapon = 'woodSword';
    hero.armor = 'travelerClothes';
    hero.weaponsOwned = ['woodSword'];
    hero.armorsOwned = ['travelerClothes'];
    hero.gold = 0;
    hero.potions = 0;
    hero.inventory = { ether: 0 };
    itemCursor = 0;
    itemUseId = 'potion';
    itemTargetIndex = 0;
    shopCursor = 0;
    slimeKills = 0;
    questDone = false;
    questRewardMsg = '';
    shopMsg = '';
    for (const key of Object.keys(flags)) flags[key] = false;
    townReturn = { x: tileToPx(10), y: tileToPx(2), exitDir: 'down' };
    dungeonReturn = { x: tileToPx(13), y: tileToPx(8), exitDir: 'up' };
    field2Return = { x: tileToPx(2), y: tileToPx(10), exitDir: 'up' };
    shadowTownReturn = { x: tileToPx(3), y: tileToPx(1), exitDir: 'down' };
    cursedForestReturn = { x: tileToPx(3), y: tileToPx(10), exitDir: 'up' };
    outpostReturn = { x: tileToPx(12), y: tileToPx(5), exitDir: 'right' };
    houseReturn = { x: tileToPx(6), y: tileToPx(5) };
    castleReturn  = { x: tileToPx(12), y: tileToPx(1), exitDir: 'down' };
    setStartPosition();
    foe     = null;
    battleEnemies = [];
    battleTurnQueue = [];
    battleTargetMode = null;
    selectedTargetIndex = 0;
    clearBattleIntro();
    heroTurn = true;
    currentBattleBgKey = 'field';
    winMsg = '';
    battleVictory = { active: false, pending: false, messages: [], index: 0 };
    talkNpc = null;
    talkPage = 0;
    activeSign = null;
    readPage = 0;
    fireEffects = []; leafEffects = []; slashEffects = []; hitEffects = [];
    hideBtns();
  }

  // ============================================================
  // ゲーム開始！
  // ============================================================
  loadTileImages();   // tiles/ フォルダの画像を非同期ロード開始
  loadSpriteImages(); // sprites/ フォルダの画像を非同期ロード開始
  loop();             // ロード完了を待たずに開始（ロード前は fillRect で描画）
  </script>
</body>
</html>
