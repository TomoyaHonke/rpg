  // ============================================================
  // メインループ（毎フレーム呼ばれる）
  // ============================================================
  // ============================================================
  // HTML ステータスバーを更新する
  // ============================================================
  function updateStatusBar() {
    document.getElementById('statusName').textContent = `Lv.${hero.level}  ゆうしゃ  ${getCurrentWeapon().name}  ${getCurrentArmor().name}  EXP ${hero.exp}  G ${hero.gold}`;

    // HP バー
    const hpRatio = hero.hp / hero.maxHp;
    const hpFill  = document.getElementById('hpBarFill');
    hpFill.style.width      = `${Math.round(hpRatio * 100)}%`;
    hpFill.style.background = hpRatio > 0.5 ? '#44dd44' : hpRatio > 0.25 ? '#dddd44' : '#dd3333';
    document.getElementById('hpText').textContent = `${hero.hp}/${hero.maxHp}`;

    // MP バー
    const mpFill = document.getElementById('mpBarFill');
    mpFill.style.width = `${Math.round(hero.mp / hero.maxMp * 100)}%`;
    document.getElementById('mpText').textContent = `${hero.mp}/${hero.maxMp}`;

    document.getElementById('locationLabel').textContent = getLocationName();
  }

  function getLocationName() {
    if (currentMap === dungeonMap) return '◆ くらやみの洞窟';
    if (currentMap === townMap) return '★ ヒカリのまち';
    if (currentMap === shadowTownMap) return '★ カゲのまち';
    if (currentMap === field2Map) return '◆ 荒野';
    if (currentMap === cursedForestMap) return '★ 呪われた森';
    if (isHouseMap(currentMap)) {
      return currentHouseId && currentHouseId.startsWith('shadow') ? '★ カゲのまち' : '★ ヒカリのまち';
    }
    return '';
  }

  function setGameState(nextState) {
    currentState = nextState;
    if (nextState !== GameState.MAP) {
      keys.up = keys.down = keys.left = keys.right = false;
      hero.vx = 0;
      hero.vy = 0;
    }
    if (nextState === GameState.MAP || nextState === GameState.TALK || nextState === GameState.SHOP || nextState === GameState.EQUIP) {
      hideBtns();
    }
  }

  function updateMap() {
    updateEntities();
  }

  function drawMap() {
    renderMap();
  }

  function updateTalk() {}

  function drawTalk() {
    renderMap();
    if (activeSign) renderSignReadWindow();
    else renderTalkWindow();
  }

  function updateShop() {}

  function drawShop() {
    renderMap();
    renderTalkWindow();
  }

  function updateBattle() {
    if (foe && foe.hitFlashFrames > 0) foe.hitFlashFrames--;
    if (foe && foe.isDying && foe.deathTimer > 0) {
      foe.deathTimer--;
      if (foe.deathTimer <= 0) foe = null;
    }
    updateFireEffects();
  }

  function drawBattle() {
    renderBattle();
  }

  function updateEquip() {}

  function drawEquip() {
    renderMap();
    renderEquipMenu();
  }

  function updateCurrentState() {
    if (currentState === GameState.MAP) updateMap();
    else if (currentState === GameState.TALK) updateTalk();
    else if (currentState === GameState.SHOP) updateShop();
    else if (currentState === GameState.BATTLE) updateBattle();
    else if (currentState === GameState.EQUIP) updateEquip();
  }

  function drawCurrentState() {
    if (currentState === GameState.MAP) drawMap();
    else if (currentState === GameState.TALK) drawTalk();
    else if (currentState === GameState.SHOP) drawShop();
    else if (currentState === GameState.BATTLE) drawBattle();
    else if (currentState === GameState.EQUIP) drawEquip();
    else if (currentState === GameState.WIN) renderWin();
    else if (currentState === GameState.LOSE) renderLose();
  }

  function loop() {
    ctx.clearRect(0, 0, VIEW_W, VIEW_H);
    updateCurrentState();
    updateStatusBar();
    drawCurrentState();
    requestAnimationFrame(loop); // 次のフレームへ
  }

  // ============================================================
  // バトルボタンの表示・非表示
  // ============================================================
  function showBtns() {
    btnArea.innerHTML = `
      <button class="btn" onclick="doAtk()">⚔ こうげき</button>
      <button class="btn" onclick="doMagic()">✨ ファイア (MP2)</button>
      <button class="btn" onclick="doPotion()">ポーション</button>
      <button class="btn" onclick="doRun()">💨 にげる</button>
    `;
  }
  function hideBtns() {
    btnArea.innerHTML = '';
  }

  function showShopBtns() {
    btnArea.innerHTML = `
      <button class="btn" onclick="buyPotion()">ポーション 10G</button>
      <button class="btn" onclick="buySteelSword()">鋼の剣 30G</button>
      <button class="btn" onclick="buyIronArmor()">鉄のよろい 40G</button>
      <button class="btn" onclick="advanceDialogue()">とじる</button>
    `;
  }

  function buyPotion() {
    if (!isShopAvailable()) return;
    if (hero.gold < 10) {
      shopMsg = 'ゴールドが足りない！';
      return;
    }
    hero.gold -= 10;
    hero.potions++;
    shopMsg = `ポーションを買った！ 所持数 ${hero.potions}`;
  }

  function buySteelSword() {
    if (!isShopAvailable()) return;
    if (hero.weaponsOwned.includes('steelSword')) {
      shopMsg = '鋼の剣は　もう持っている！';
      return;
    }
    if (hero.gold < 30) {
      shopMsg = 'ゴールドが足りない！';
      return;
    }
    hero.gold -= 30;
    hero.weaponsOwned.push('steelSword');
    shopMsg = '鋼の剣を買った！';
  }

  function buyIronArmor() {
    if (!isShopAvailable()) return;
    if (hero.armorsOwned.includes('ironArmor')) {
      shopMsg = '鉄のよろいは　もう持っている！';
      return;
    }
    if (hero.gold < 40) {
      shopMsg = 'ゴールドが足りない！';
      return;
    }
    hero.gold -= 40;
    hero.armorsOwned.push('ironArmor');
    shopMsg = '鉄のよろいを買った！';
  }

  // ============================================================
  // 会話（トーク）システム
  // ============================================================

  // 会話を開始する
  function openDialogue(npc) {
    const role = getNpcRole(npc);
    if (role === 'inn') {
      hero.hp = hero.maxHp;
      hero.mp = hero.maxMp;
    }
    activeSign = null;
    readPage = 0;
    talkNpc  = npc;
    talkNpc._lines = getNpcLines(npc); // イベント発火前にセリフを確定
    handleNpcEvent(npc);               // アイテム付与などはセリフ表示後に発火
    talkPage = 0;
    setGameState(GameState.TALK);
  }

  function openShop(npc) {
    shopMsg = '';
    activeSign = null;
    readPage = 0;
    talkNpc = npc;
    talkPage = 0;
    setGameState(GameState.SHOP);
    showShopBtns();
  }

  // セリフを1ページ進める（最終ページなら会話終了）
  function advanceDialogue() {
    if (activeSign) {
      readPage++;
      const readLines = getSignReadLines(activeSign);
      if (readPage >= readLines.length) {
        if (activeSign.flagKey) flags[activeSign.flagKey] = true;
        activeSign = null;
        readPage = 0;
        setGameState(GameState.MAP);
      }
      return;
    }
    if (!talkNpc) return;
    talkPage++;
    const lineCount = isShopAvailable() ? 1 : (talkNpc._lines || getNpcLines(talkNpc)).length;
    if (talkPage >= lineCount) {
      talkNpc  = null;
      talkPage = 0;
      setGameState(GameState.MAP);
    }
  }

  function getSignReadLines(sign) {
    return ['看板には', ...(sign.lines || []), '……と書かれている'];
  }

  function openSignRead(sign) {
    talkNpc = null;
    talkPage = 0;
    activeSign = sign;
    readPage = 0;
    setGameState(GameState.TALK);
  }

  // ============================================================
  // バトル開始
  // ============================================================
  function isCursedForestEncounterMap() {
    return currentMap === cursedForestMap;
  }

  function isDeepCaveEncounter() {
    return currentMap === dungeonMap && heroTileY() <= 5;
  }

  function applyEnemyVariance(enemy) {
    if (enemy.isBoss || enemy.boss) return enemy;

    const vary = (value, rate = 0.1, min = 0) => {
      const factor = 1 + (Math.random() * 2 - 1) * rate;
      return Math.max(min, Math.round(value * factor));
    };

    enemy.maxHp = vary(enemy.maxHp, 0.1, 1);
    enemy.hp = enemy.maxHp;
    enemy.atk = vary(enemy.atk, 0.1, 1);
    enemy.exp = vary(enemy.exp || 0, 0.1, 0);
    enemy.gold = vary(enemy.gold || 0, 0.1, 0);
    return enemy;
  }

  function chooseEnemy() {
    let enemies;
    if (isCursedForestEncounterMap()) enemies = [SNAKE_BASE, OWL_BASE, TREE_MINION_BASE];
    else if (isDeepCaveEncounter()) enemies = [SKELETON_BASE, GOBLIN_BASE, DARK_SOLDIER_BASE, DARK_MAGE_BASE];
    else if (currentMap === dungeonMap) enemies = [BAT_BASE, CAVE_SPIDER_BASE, SKELETON_BASE, GOBLIN_BASE];
    else if (currentMap === field2Map) enemies = [SNAKE_BASE, OWL_BASE];
    else enemies = [SLIME_BASE, WILD_RAT_BASE, HORNET_BASE, WANDERING_MUSHROOM_BASE];
    return applyEnemyVariance({ ...enemies[rng(0, enemies.length - 1)] });
  }

  function startBattle() {
    foe      = chooseEnemy(); // マップに応じて敵を生成
    fireEffects = [];
    currentBattleBgKey = foe.battleBgKey || (currentMap === dungeonMap ? 'cave' : 'field');
    setGameState(GameState.BATTLE);
    heroTurn = true;
    msg      = `${foe.name} が　あらわれた！`;
    hideBtns();
    setTimeout(() => { if (currentState === GameState.BATTLE) showBtns(); }, 700); // 少し間を置いてからボタン表示
  }

  function startBossBattle() {
    if (flags.defeatedDarkKnight) return;
    foe      = { ...DARK_KNIGHT_BASE };
    fireEffects = [];
    currentBattleBgKey = foe.battleBgKey || 'boss';
    setGameState(GameState.BATTLE);
    heroTurn = true;
    msg      = `${foe.name} が　立ちはだかった！`;
    hideBtns();
    setTimeout(() => { if (currentState === GameState.BATTLE) showBtns(); }, 700);
  }

  function startForestBossBattle() {
    if (flags.defeatedForestBoss) return;
    foe      = { ...ENEMY_DEFS.forest_boss };
    fireEffects = [];
    currentBattleBgKey = foe.battleBgKey || 'forest_boss';
    setGameState(GameState.BATTLE);
    heroTurn = true;
    msg      = `${foe.name} が　現れた！`;
    hideBtns();
    setTimeout(() => { if (currentState === GameState.BATTLE) showBtns(); }, 700);
  }

  // ============================================================
  // プレイヤーの行動：こうげき
  // ============================================================
  function triggerEnemyHitEffect(enemy) {
    if (!enemy) return;
    enemy.hitFlashFrames = 10;
  }

  function triggerEnemyDeath(enemy) {
    if (!enemy || enemy.isDying) return;
    enemy.isDying = true;
    enemy.deathDuration = enemy.boss ? 40 : 30;
    enemy.deathTimer = enemy.deathDuration;
    enemy.hitFlashFrames = Math.max(enemy.hitFlashFrames || 0, 12);
    spawnFireEffectOnEnemy(enemy);
  }

  function doAtk() {
    if (!heroTurn || currentState !== GameState.BATTLE || !foe || foe.isDying) return;
    hideBtns();
    const dmg = Math.max(1, getHeroAttack() - foe.def + rng(-1, 3));
    foe.hp    = Math.max(0, foe.hp - dmg);
    triggerEnemyHitEffect(foe);
    msg       = `ゆうしゃの　こうげき！　${dmg} のダメージ！`;
    afterHeroAction();
  }

  // ============================================================
  // プレイヤーの行動：ファイア（まほう）
  // ============================================================
  function doMagic() {
    if (!heroTurn || currentState !== GameState.BATTLE || !foe || foe.isDying) return;
    if (hero.mp < 2) {
      msg = 'MPが　たりない！';
      return;
    }
    hideBtns();
    hero.mp -= 2;
    const dmg = Math.max(1, getHeroAttack() * 2 - foe.def + rng(0, 5));
    foe.hp    = Math.max(0, foe.hp - dmg);
    triggerEnemyHitEffect(foe);
    spawnFireEffectOnEnemy(foe);
    msg       = `ファイア！　${dmg} のダメージ！`;
    afterHeroAction();
  }

  // ============================================================
  // プレイヤーの行動：ポーション
  // ============================================================
  function doPotion() {
    if (!heroTurn || currentState !== GameState.BATTLE) return;
    if (hero.potions <= 0) {
      msg = 'ポーションを持っていない！';
      return;
    }
    hideBtns();
    hero.potions--;
    const beforeHp = hero.hp;
    hero.hp = Math.min(hero.maxHp, hero.hp + 15);
    msg = `ポーションを使った！ HPが ${hero.hp - beforeHp} 回復した！`;
    heroTurn = false;
    setTimeout(enemyTurn, 1300);
  }

  // ============================================================
  // プレイヤーの行動：にげる
  // ============================================================
  function doRun() {
    if (!heroTurn || currentState !== GameState.BATTLE) return;
    if (foe && foe.boss) {
      msg = foe.id === 'forest_boss'
        ? 'ジュレイからは　にげられない！'
        : 'ダークナイトからは　にげられない！';
      return;
    }
    hideBtns();
    if (Math.random() < 0.6) {
      msg = 'うまく　にげきった！';
      setTimeout(() => { setGameState(GameState.MAP); }, 1000);
    } else {
      msg      = 'にげられなかった！';
      heroTurn = false;
      setTimeout(enemyTurn, 1300);
    }
  }

  // ============================================================
  // プレイヤー行動後の処理（敵が生きているか確認）
  // ============================================================
  function afterHeroAction() {
    if (foe.hp <= 0) {
      triggerEnemyDeath(foe);
      const defeatedFoe = foe;
      // 勝利！
      setTimeout(() => {
        if (defeatedFoe.name === 'スライム') slimeKills++;
        const leveled = gainExp(defeatedFoe.exp);
        hero.gold += defeatedFoe.gold || 0;
        if (defeatedFoe.boss && defeatedFoe.id === 'forest_boss') {
          flags.defeatedForestBoss = true;
          flags.gotSeal2 = true;
          flags.gotDemonKey = true;
          winMsg = leveled
            ? ['封印石・弐を砕いた！', '魔王の城への鍵を手に入れた！', 'レベルアップ！']
            : ['封印石・弐を砕いた！', '魔王の城への鍵を手に入れた！'];
        } else if (defeatedFoe.boss) {
          flags.defeatedDarkKnight = true;
          flags.gotSeal1 = true;
          winMsg = leveled
            ? 'ダークナイトを倒した！ 封印石・壱を手に入れた！ レベルアップ！'
            : 'ダークナイトを倒した！ 封印石・壱を手に入れた！';
        } else {
          winMsg = leveled ? `${defeatedFoe.exp} けいけんちと ${defeatedFoe.gold || 0}Gを　えた！ レベルアップ！` : `${defeatedFoe.exp} けいけんちと ${defeatedFoe.gold || 0}Gを　えた！`;
        }
        setGameState(GameState.WIN);
      }, 900);
    } else {
      // 敵のターンへ
      heroTurn = false;
      setTimeout(enemyTurn, 1300);
    }
  }

  // ============================================================
  // 敵のターン（自動で攻撃してくる）
  // ============================================================
  function enemyTurn() {
    if (currentState !== GameState.BATTLE || !foe || foe.isDying) return;
    const dmg = Math.max(1, foe.atk - getHeroDefense() + rng(-1, 3));
    hero.hp   = Math.max(0, hero.hp - dmg);
    msg       = `${foe.name}の　こうげき！　${dmg} のダメージ！`;
    if (hero.hp <= 0) {
      // ゲームオーバー
      setTimeout(() => { setGameState(GameState.LOSE); }, 1000);
    } else {
      // プレイヤーのターンへ戻る
      heroTurn = true;
      setTimeout(() => {
        msg = 'どうする？';
        showBtns();
      }, 1300);
    }
  }

  // ============================================================
  // NPC ロール・イベントシステム
  // ============================================================

  // role を正規化して返す（legacy フラグを後方互換で読む）
  function getNpcRole(npc) {
    if (npc.role) return npc.role;
    if (npc.shop)  return 'shop';
    if (npc.inn)   return 'inn';
    if (npc.quest) return 'event';
    return 'talk';
  }

  // ============================================================
  // NPC 会話テーブル（npcId → flags を見てセリフ配列を返す）
  // 副作用なし。新規NPC追加時はここにエントリを追加するだけでよい。
  // ============================================================
  const NPC_DIALOGUES = {
    elder: () => {
      if (flags.gotSeal2) return [
        '二つの封印石を砕いたか…',
        '魔王の城の扉は　魔王の鍵でのみ　開く。',
        'お前ならできる。行くのじゃ！',
      ];
      if (flags.defeatedDarkKnight) return [
        'ダークナイトを倒したか。よくやった！',
        '封印石・壱を持って　西の荒野へ向かえ。',
        'カゲのまちの　鍛冶屋を　訪ねるのじゃ。',
      ];
      if (flags.talkedToElder) return [
        'スライムには　気をつけるのじゃ。',
        '南東のダンジョンに　強い敵がいるぞ。',
        '準備を整えてから　挑むのじゃ。',
      ];
      return [
        'おお、旅人よ。よくぞ　ヒカリのまちへ。',
        'このあたりの　草むらには　スライムが出る。',
        '南東の　ダンジョンへ　行けるくらい強くなれ！',
      ];
    },
    child: () => {
      if (slimeKills >= 3) return [questRewardMsg || 'ありがとう！'];
      return ['スライムを3匹倒してきて'];
    },
    shadow_smith: () => {
      if (flags.gotSeal2) return ['魔王の城への鍵を　手に入れたのか。', '奴を倒せるのは　お前だけだ。気をつけろ。'];
      if (flags.defeatedForestBoss) return ['樹霊を倒したか…　大したものだ。', '封印石・弐が　砕けたはずだ。'];
      if (flags.gotForestPass) return ['森は危険だ。気をつけて行け。', 'この町を出て　南へ進め。森の入口がある。'];
      if (flags.gotSeal1) return [
        'おお…　封印石を砕いたのか。なかなかやるな。',
        'ならばこれを持っていけ。',
        '「呪われた森への通行証」だ。',
        'この町の南に　森の入口がある。',
      ];
      return ['ここ　カゲのまちへ　よく来たな。', 'まずは　洞窟の　ダークナイトを　倒すことだ。'];
    },
  };

  // npcId → セリフ配列を返す（NPC_DIALOGUES → role fallback → npc.lines の順）
  function getNpcLines(npc) {
    if (npc.npcId && NPC_DIALOGUES[npc.npcId]) return NPC_DIALOGUES[npc.npcId]();
    if (getNpcRole(npc) === 'inn') return ['HPとMPが回復した！'];
    return npc.lines;
  }

  // ============================================================
  // NPC イベントテーブル（会話開始時に一度だけ呼ばれる副作用）
  // ============================================================
  const NPC_EVENTS = {
    elder: () => { flags.talkedToElder = true; },
    shadow_smith: () => {
      if (flags.gotSeal1 && !flags.gotForestPass) {
        flags.gotForestPass = true;
        showNotice('森の通行証を手に入れた！');
      }
    },
    child: () => {
      if (slimeKills >= 3 && !questDone) {
        const leveled = gainExp(5);
        questDone = true;
        questRewardMsg = leveled
          ? 'ありがとう！ 経験値を5獲得した！ レベルアップ！'
          : 'ありがとう！ 経験値を5獲得した！';
      }
    },
  };

  // NPC との会話開始時に呼ばれる個別イベントフック
  function handleNpcEvent(npc) {
    if (npc.npcId && NPC_EVENTS[npc.npcId]) {
      NPC_EVENTS[npc.npcId]();
    }
  }

  // ============================================================
  // プレイヤーの移動
  // ============================================================
  function isHouseMap(map) {
    return Object.values(houseMaps).includes(map);
  }

  function getAdjacentBoss() {
    return getAdjacentEntity('boss');
  }

  function checkTileEvents() {
    const heroBox = getCollisionBox(hero);
    const eventEntity = getEventEntityForBox(heroBox);
    if (eventEntity) {
      const key = getEntityKey(eventEntity);
      if (key !== lastEventEntityKey) {
        lastEventEntityKey = key;
        eventEntity.interact();
      }
      return;
    }
    lastEventEntityKey = null;

    const unreadSign = getCollidingEntity(heroBox, 'sign');
    if (unreadSign && unreadSign.flagKey && !flags[unreadSign.flagKey]) {
      openSignRead(unreadSign);
      return;
    }

    const tx = heroTileX();
    const ty = heroTileY();
    const tile = tileAt(tx, ty);
    if (hero.justExited > 0) return;
    if (encounterTimer) return;
    const terrainKey = `${getCurrentMapId()}:${tx},${ty}`;
    if (terrainKey === lastEncounterTerrainKey) return;
    lastEncounterTerrainKey = terrainKey;
    if ((currentMap === fieldMap || currentMap === field2Map) && tileHasEncounter(tile) && Math.random() < ENC_RATE) {
      encounterTimer = setTimeout(() => { encounterTimer = null; startBattle(); }, 80);
    }
    if (currentMap === dungeonMap && tileHasEncounter(tile) && Math.random() < ENC_RATE) {
      encounterTimer = setTimeout(() => { encounterTimer = null; startBattle(); }, 80);
    }
    if (currentMap === cursedForestMap && tileHasEncounter(tile) && Math.random() < ENC_RATE) {
      encounterTimer = setTimeout(() => { encounterTimer = null; startBattle(); }, 80);
    }
  }

  function showNotice(text) {
    const notification = document.getElementById('notification');
    notification.textContent = text;
    setTimeout(() => {
      if (notification.textContent === text) notification.textContent = '';
    }, 1800);
  }

  function saveGame() {
    const data = {
      hero: {
        x: hero.x, y: hero.y,
        vx: hero.vx, vy: hero.vy,
        hp: hero.hp, maxHp: hero.maxHp,
        mp: hero.mp, maxMp: hero.maxMp,
        atk: hero.atk, def: hero.def,
        weapon: hero.weapon,
        armor: hero.armor,
        weaponsOwned: hero.weaponsOwned,
        armorsOwned: hero.armorsOwned,
        level: hero.level, exp: hero.exp,
        gold: hero.gold, potions: hero.potions,
        dir: hero.dir,
      },
      coordVersion: 2,
      quest: {
        slimeKills,
        questDone,
        questRewardMsg,
      },
      flags: { ...flags },
      returns: {
        town: townReturn,
        dungeon: dungeonReturn,
        house: houseReturn,
        field2: field2Return,
        shadowTown: shadowTownReturn,
        cursedForest: cursedForestReturn,
      },
      houseId: currentHouseId,
      map: getCurrentMapId(),
    };
    localStorage.setItem(SAVE_KEY, JSON.stringify(data));
    showNotice('セーブしました');
  }

  function loadGame() {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) {
      setStartPosition();
      setGameState(GameState.MAP);
      foe = null;
      talkNpc = null;
      talkPage = 0;
      activeSign = null;
      readPage = 0;
      equipCursor = 0;
      hideBtns();
      showNotice('セーブデータがありません');
      return;
    }
    try {
      const data = JSON.parse(raw);
      if (data.hero) Object.assign(hero, data.hero);
      if (data.coordVersion !== 2) {
        const p = normalizeSavedPoint({ x: hero.x, y: hero.y }, { x: tileToPx(1), y: tileToPx(1) });
        hero.x = p.x;
        hero.y = p.y;
      }
      if (!WEAPONS[hero.weapon]) hero.weapon = 'woodSword';
      if (!ARMORS[hero.armor]) hero.armor = 'travelerClothes';
      hero.weaponsOwned = Array.isArray(hero.weaponsOwned) ? hero.weaponsOwned.filter(id => WEAPONS[id]) : ['woodSword'];
      hero.armorsOwned = Array.isArray(hero.armorsOwned) ? hero.armorsOwned.filter(id => ARMORS[id]) : ['travelerClothes'];
      if (!hero.weaponsOwned.includes('woodSword')) hero.weaponsOwned.unshift('woodSword');
      if (!hero.armorsOwned.includes('travelerClothes')) hero.armorsOwned.unshift('travelerClothes');
      if (!hero.weaponsOwned.includes(hero.weapon)) hero.weaponsOwned.push(hero.weapon);
      if (!hero.armorsOwned.includes(hero.armor)) hero.armorsOwned.push(hero.armor);
      hero.dir = hero.dir || 'down';
      hero.vx = 0;
      hero.vy = 0;
      if (data.quest) {
        slimeKills = data.quest.slimeKills || 0;
        questDone = !!data.quest.questDone;
        questRewardMsg = data.quest.questRewardMsg || '';
      }
      // flags（後方互換: 旧セーブの bossDefeated/chestOpened も読み込む）
      if (data.flags) {
        Object.assign(flags, data.flags);
      } else {
        flags.defeatedDarkKnight = !!data.bossDefeated;
        flags.chest1Opened = !!data.chestOpened;
      }
      if (data.returns) {
        townReturn = normalizeSavedPoint(data.returns.town, townReturn);
        dungeonReturn = normalizeSavedPoint(data.returns.dungeon, dungeonReturn);
        houseReturn = normalizeSavedPoint(data.returns.house, houseReturn);
        if (data.returns.field2) field2Return = normalizeSavedPoint(data.returns.field2, field2Return);
        if (data.returns.shadowTown) shadowTownReturn = normalizeSavedPoint(data.returns.shadowTown, shadowTownReturn);
        if (data.returns.cursedForest) cursedForestReturn = normalizeSavedPoint(data.returns.cursedForest, cursedForestReturn);
      } else if (data.fieldReturn) {
        townReturn = normalizeSavedPoint(data.fieldReturn, townReturn);
        dungeonReturn = normalizeSavedPoint(data.fieldReturn, dungeonReturn);
      }
      currentHouseId = data.houseId && houseMaps[data.houseId] ? data.houseId : null;
      if (data.map === 'house' && !currentHouseId) currentHouseId = 'west';
      currentMap = data.map === 'town' ? townMap
        : data.map === 'dungeon' ? dungeonMap
        : data.map === 'field2' ? field2Map
        : data.map === 'shadowTown' ? shadowTownMap
        : data.map === 'cursedForest' ? cursedForestMap
        : data.map === 'house' ? houseMaps[currentHouseId]
        : fieldMap;
      if (isHouseMap(currentMap) && (heroTileX() < 0 || heroTileX() >= mapCols() || heroTileY() < 0 || heroTileY() >= mapRows())) {
        hero.x = tileToPx(3);
        hero.y = tileToPx(4);
      }
      setGameState(GameState.MAP);
      foe = null;
      talkNpc = null;
      talkPage = 0;
      activeSign = null;
      readPage = 0;
      equipCursor = 0;
      snapDrawPos();
      hideBtns();
      showNotice('ロードしました');
    } catch (e) {
      showNotice('ロードに失敗しました');
    }
  }

  // ============================================================
  // キーボード入力
  // ============================================================
  document.addEventListener('keydown', e => {
    if (e.shiftKey && (e.key === 's' || e.key === 'S')) {
      e.preventDefault();
      saveGame();
      return;
    }
    if (e.shiftKey && (e.key === 'l' || e.key === 'L')) {
      e.preventDefault();
      loadGame();
      return;
    }
    if (currentState === GameState.MAP) {
      if (e.key === 'e' || e.key === 'E') {
        e.preventDefault();
        equipCursor = 0;
        setGameState(GameState.EQUIP);
        return;
      }
      if (e.key === 'ArrowUp'    || e.key === 'w') { e.preventDefault(); keys.up = true; }
      if (e.key === 'ArrowDown'  || e.key === 's') { e.preventDefault(); keys.down = true; }
      if (e.key === 'ArrowLeft'  || e.key === 'a') { e.preventDefault(); keys.left = true; }
      if (e.key === 'ArrowRight' || e.key === 'd') { e.preventDefault(); keys.right = true; }
      // Space・Enter・Z で隣接した対象に話しかける/調べる
      if (e.key === ' ' || e.key === 'Enter' || e.key === 'z' || e.key === 'Z') {
        e.preventDefault();
        const adj = getAdjacentInteractable();
        if (adj) {
          adj.interact();
        } else {
          const boss = getAdjacentBoss();
          if (boss) boss.interact();
        }
      }
    } else if (currentState === GameState.EQUIP) {
      const items = getEquipItems();
      if (e.key === 'Escape' || e.key === 'e' || e.key === 'E') {
        e.preventDefault();
        setGameState(GameState.MAP);
        return;
      }
      if (e.key === 'ArrowUp') {
        e.preventDefault();
        equipCursor = items.length ? (equipCursor + items.length - 1) % items.length : 0;
        return;
      }
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        equipCursor = items.length ? (equipCursor + 1) % items.length : 0;
        return;
      }
      if (e.key === 'Enter') {
        e.preventDefault();
        const entry = items[equipCursor];
        if (entry) {
          if (entry.type === 'weapon') hero.weapon = entry.id;
          if (entry.type === 'armor') hero.armor = entry.id;
          updateStatusBar();
        }
        return;
      }
    } else if (currentState === GameState.TALK || currentState === GameState.SHOP) {
      // Space・Enter・Z・Escape でセリフを進める／会話を閉じる
      if (e.key === ' ' || e.key === 'Enter' || e.key === 'z' || e.key === 'Z'
          || e.key === 'Escape') {
        e.preventDefault();
        advanceDialogue();
      }
    } else if (currentState === GameState.WIN) {
      backToMap();
    } else if (currentState === GameState.LOSE) {
      resetGame();
    }
  });

  document.addEventListener('keyup', e => {
    if (e.key === 'ArrowUp'    || e.key === 'w') keys.up = false;
    if (e.key === 'ArrowDown'  || e.key === 's') keys.down = false;
    if (e.key === 'ArrowLeft'  || e.key === 'a') keys.left = false;
    if (e.key === 'ArrowRight' || e.key === 'd') keys.right = false;
  });

  // キャンバスをクリックしても勝利・ゲームオーバー画面を進められる
  canvas.addEventListener('click', () => {
    if (currentState === GameState.TALK || currentState === GameState.SHOP) advanceDialogue();
    if (currentState === GameState.WIN)  backToMap();
    if (currentState === GameState.LOSE) resetGame();
  });

  // マップへ戻る
  function backToMap() {
    setGameState(GameState.MAP);
    foe      = null;
    winMsg   = '';
    fireEffects = [];
    hideBtns();
  }

  // ゲームをリセット（最初から）
  function resetGame() {
    hero.hp = hero.maxHp;
    hero.mp = hero.maxMp;
    hero.gold = 0;
    hero.potions = 0;
    flags.defeatedDarkKnight = false;
    flags.chest1Opened = false;
    flags.chest2Opened = false;
    flags.reachedField2 = false;
    flags.reachedShadowTown = false;
    flags.gotSeal1 = false;
    flags.gotSeal2 = false;
    flags.gotForestPass = false;
    flags.defeatedForestBoss = false;
    flags.gotDemonKey = false;
    flags.forestChest1Opened = false;
    flags.forestChest2Opened = false;
    flags.talkedToElder = false;
    flags.readCaveWarningSign = false;
    townReturn = { x: tileToPx(10), y: tileToPx(2), exitDir: 'down' };
    dungeonReturn = { x: tileToPx(13), y: tileToPx(10), exitDir: 'up' };
    houseReturn = { x: tileToPx(7), y: tileToPx(4) };
    setStartPosition();
    setGameState(GameState.MAP);
    foe     = null;
    talkNpc = null;
    talkPage = 0;
    activeSign = null;
    readPage = 0;
    fireEffects = [];
    hideBtns();
  }

  // ============================================================
  // ゲーム開始！
  // ============================================================
  loadTileImages();   // tiles/ フォルダの画像を非同期ロード開始
  loadSpriteImages(); // sprites/ フォルダの画像を非同期ロード開始
  loop();             // ロード完了を待たずに開始（ロード前は fillRect で描画）
  </script>
</body>
</html>
