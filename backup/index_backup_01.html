<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ドット絵RPG</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
    }
    h1 {
      color: #ffd700;
      font-size: 22px;
      margin-bottom: 8px;
      letter-spacing: 4px;
    }
    #gamePanel {
      border: 3px solid #444466;
      display: flex;
      flex-direction: column;
    }
    #statusBar {
      background: #12122a;
      border-bottom: 1px solid #333355;
      padding: 6px 14px;
      display: flex;
      align-items: center;
      gap: 18px;
      font-family: 'Courier New', monospace;
      color: #fff;
    }
    #statusName  { color: #ffd700; font-size: 13px; white-space: nowrap; }
    .statGroup   { display: flex; align-items: center; gap: 6px; }
    .statLabel   { font-size: 12px; width: 20px; }
    .statLabel.hp { color: #ff6666; }
    .statLabel.mp { color: #6699ff; }
    .barBg       { background: #111; width: 110px; height: 10px; border: 1px solid #555; }
    .barFill     { height: 100%; background: #dd3333; }
    .barFill.mp  { background: #3366cc; }
    #hpText, #mpText { font-size: 11px; color: #ccc; min-width: 44px; }
    #locationLabel { color: #ffd700; font-size: 12px; margin-left: auto; white-space: nowrap; }
    canvas { display: block; }
    #btnArea {
      margin-top: 8px;
      display: flex;
      gap: 8px;
      min-height: 44px;
    }
    .btn {
      background: #1a1a3a;
      color: #ffffff;
      border: 2px solid #5555aa;
      padding: 8px 20px;
      font-family: 'Courier New', monospace;
      font-size: 15px;
      cursor: pointer;
    }
    .btn:hover { background: #2a2a5a; }
    #notification {
      min-height: 24px;
      margin-top: 6px;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      color: #aaffaa;
      text-align: center;
      letter-spacing: 1px;
      text-shadow: 0 0 10px #44ff88;
    }
    #hint { margin-top: 4px; color: #666688; font-size: 12px; }
  </style>
</head>

  // ============================================================
  // ユーティリティ
  // ============================================================
  function shadeHex(hex, amount) {
    const raw = hex.replace('#', '');
    const num = parseInt(raw, 16);
    const r = Math.max(0, Math.min(255, (num >> 16) + amount));
    const g = Math.max(0, Math.min(255, ((num >> 8) & 255) + amount));
    const b = Math.max(0, Math.min(255, (num & 255) + amount));

    return `#${((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1)}`;
  }

  // min〜max のランダム整数を返す
  function rng(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }

  // シャドウ付きテキストを描画する
  function txt(s, x, y, col = '#fff', sz = 14) {
    ctx.font = `${sz}px "Courier New", monospace`;
    ctx.fillStyle = '#000';
    ctx.fillText(s, x + 1, y + 1); // 影
    ctx.fillStyle = col;
    ctx.fillText(s, x, y);
  }

  // HPバー（横長のゲージ）を描画する
  function drawBar(x, y, w, cur, max, col) {
    ctx.fillStyle = '#111';
    ctx.fillRect(x, y, w, 10);
    ctx.fillStyle = col;
    ctx.fillRect(x, y, Math.round(w * cur / max), 10);
    ctx.strokeStyle = '#888';
    ctx.lineWidth = 1;
    ctx.strokeRect(x, y, w, 10);
  }

  // 経験値を加算し、一定値に達したらレベルアップする
  function gainExp(amount) {
    hero.exp += amount;
    let leveled = false;
    while (hero.exp >= hero.level * 20) {
      hero.exp -= hero.level * 20;
      hero.level++;
      hero.maxHp += 5;
      hero.maxMp += 2;
      hero.atk += 2;
      hero.hp = hero.maxHp;
      hero.mp = hero.maxMp;
      leveled = true;
    }
    return leveled;
  }

  function drawTile(col, row) {

    const p = n => Math.max(1, Math.round(n * TILE / 32));
    const dot = (dx, dy, col) => {
      ctx.fillStyle = col;
      ctx.fillRect(x + p(dx), y + p(dy), p(1), p(1));
    };
    const grassBase = () => {
      ctx.fillStyle = '#4a8c3f'; ctx.fillRect(x, y, TILE, TILE);
      ctx.fillStyle = '#5aa84e';
      ctx.fillRect(x + p(3),  y + p(5),  p(3), p(1));
      ctx.fillRect(x + p(11), y + p(13), p(3), p(1));
      ctx.fillRect(x + p(20), y + p(4),  p(2), p(2));
      ctx.fillRect(x + p(25), y + p(22), p(3), p(1));
      ctx.fillRect(x + p(7),  y + p(27), p(3), p(1));
      ctx.fillStyle = '#3a6e30';
      ctx.fillRect(x + p(5),  y + p(19), p(2), p(1));
      ctx.fillRect(x + p(16), y + p(8),  p(2), p(1));
      ctx.fillRect(x + p(23), y + p(14), p(3), p(1));
      ctx.fillRect(x + p(13), y + p(25), p(2), p(1));
      dot(2, 12, '#6bb35d'); dot(29, 7, '#6bb35d'); dot(18, 28, '#2f5d28'); dot(30, 25, '#2f5d28');
    };

    if (t === T.TREE) {
      grassBase();
      ctx.fillStyle = '#5c4033'; ctx.fillRect(x + p(13), y + p(19), p(6), p(13)); // 幹
      ctx.fillStyle = '#7a543d'; ctx.fillRect(x + p(15), y + p(20), p(2), p(10));
      ctx.fillStyle = '#3b261d'; ctx.fillRect(x + p(13), y + p(24), p(1), p(6));
      ctx.fillStyle = '#2d5a1b'; ctx.fillRect(x + p(6), y + p(14), p(20), p(12)); // 葉（下）
      ctx.fillStyle = '#3a7222'; ctx.fillRect(x + p(8), y + p(8), p(16), p(11));  // 葉（中）

      ctx.fillStyle = '#1f4315';

      dot(23, 13, '#5ca83a'); dot(18, 5, '#6fbd47'); dot(14, 23, '#244f18');

    } else if (t === T.WATER) {

      ctx.fillRect(x, y + p(26), TILE, p(6));

      ctx.fillRect(x, y + p(3), TILE, p(3));

    } else if (t === T.FLOWER) {

      ctx.fillRect(x + p(4), y + p(3), p(8), p(1));
      ctx.fillRect(x + p(8), y + p(1), p(6), p(1));
      // 壁（ベージュ）
      ctx.fillStyle = '#9f7f52'; ctx.fillRect(x + p(1), y + p(9), p(30), p(23));
      ctx.fillStyle = '#c8a470'; ctx.fillRect(x + p(1), y + p(9), p(29), p(22));
      ctx.fillStyle = '#e0c08a'; ctx.fillRect(x + p(2), y + p(10), p(10), p(3));
      // ドア
      ctx.fillStyle = '#553311'; ctx.fillRect(x + p(12), y + p(20), p(8), p(12));
      // 窓（左）
      ctx.fillStyle = '#88ccff'; ctx.fillRect(x + p(3), y + p(12), p(7), p(6));
      ctx.fillStyle = '#557799'; // 窓枠
      ctx.fillRect(x + p(3),  y + p(15), p(7), p(1));
      ctx.fillRect(x + p(6),  y + p(12), p(1), p(6));
      // 窓（右）
      ctx.fillStyle = '#88ccff'; ctx.fillRect(x + p(22), y + p(12), p(7), p(6));
      ctx.fillStyle = '#557799';
      ctx.fillRect(x + p(22), y + p(15), p(7), p(1));
      ctx.fillRect(x + p(25), y + p(12), p(1), p(6));

    } else {
      // 草（GRASS）
      grassBase();
    }
  }

  // ============================================================
  // NPC ユーティリティ
  // ============================================================
  // 指定座標にいるNPCを返す（いなければ null）
  function getNpcAt(x, y) {
    if (currentMap !== townMap) return null;
    return NPCS.find(n => n.x === x && n.y === y) || null;
  }

  // プレイヤーの隣（上下左右）にいるNPCを返す（いなければ null）
  function getAdjacentNpc() {
    for (const [dx, dy] of [[0,-1],[0,1],[-1,0],[1,0]]) {
      const n = getNpcAt(hero.x + dx, hero.y + dy);
      if (n) return n;
    }
    return null;
  }

  // ============================================================
  // マップ画面を描画する
  // ============================================================
  function renderMap() {
    // 全タイルを描画
    for (let r = 0; r < ROWS; r++)
      for (let c = 0; c < COLS; c++)
        drawTile(c, r);

    if (currentMap === townMap) {
      // NPC を描画（プレイヤーより先に描くと、プレイヤーが最前面になる）
      for (const npc of NPCS) {
        drawNPC(npc.x * TILE, npc.y * TILE, 1, npc.bodyCol, npc.hairCol);
        // 「！」バルーン（話しかけられることを示す）
        const ex = npc.x * TILE + 12;
        const ey = npc.y * TILE - 8;
        ctx.fillStyle = '#ffffcc';
        ctx.fillRect(ex - 2, ey - 2, 10, 11); // 吹き出し背景
        ctx.fillStyle = '#884400';
        ctx.fillRect(ex,     ey,     6, 4);   // ! の上部の棒
        ctx.fillRect(ex,     ey + 5, 6, 2);   // ! の下部の棒
        ctx.fillRect(ex,     ey + 8, 6, 2);   // ! の点
      }
    }
    if (currentMap === dungeonMap && !bossDefeated) {
      drawDarkKnight(BOSS_POS.x * TILE, BOSS_POS.y * TILE, 1);
    }

    // 主人公を描画（タイル座標 → ピクセル座標に変換）
    drawHero(hero.x * TILE, hero.y * TILE);

  }

  // ============================================================
  // バトル画面を描画する
  // ============================================================
  function renderBattle() {
    // 背景（夜空）
    ctx.fillStyle = '#1a0d30';
    ctx.fillRect(0, 0, 512, 240);

    // 星
    ctx.fillStyle = '#ffffff';
    [[40,30],[100,15],[200,50],[300,20],[420,40],[480,10],[160,35],[360,25]].forEach(([sx, sy]) => {
      ctx.fillRect(sx, sy, 2, 2);
    });

    // 地面
    ctx.fillStyle = '#3a2040';
    ctx.fillRect(0, 240, 512, 144);
    ctx.fillStyle = '#2a1030';
    ctx.fillRect(0, 240, 512, 4);

    // 敵（左側・大きく表示）
    if (foe && foe.hp > 0) {
      drawEnemy(foe, 80, 130, 3);
      txt(foe.name, 82, 128, '#aaffaa', 16);
      txt('HP', 82, 114, '#ff6666', 12);
      drawBar(102, 104, 130, foe.hp, foe.maxHp, '#dd3333');
      txt(`${foe.hp}/${foe.maxHp}`, 104, 114, '#fff', 11);
    }

    // 主人公（右側・大きく表示）
    drawHero(340, 140, 2.5, 'down');

    // メッセージウィンドウ
    ctx.fillStyle = 'rgba(5,5,20,0.92)';
    ctx.fillRect(8, 256, 496, 52);
    ctx.strokeStyle = '#5555aa';
    ctx.lineWidth = 2;
    ctx.strokeRect(8, 256, 496, 52);
    txt(msg, 18, 282, '#ffffff', 14);

    // プレイヤーステータス（左下）
    ctx.fillStyle = 'rgba(5,5,20,0.92)';
    ctx.fillRect(8, 314, 224, 64);
    ctx.strokeStyle = '#5555aa';
    ctx.lineWidth = 2;
    ctx.strokeRect(8, 314, 224, 64);
    txt(`Lv.${hero.level}  ゆうしゃ`, 16, 330, '#ffd700', 13);
    txt('HP', 16, 348, '#ff6666', 12);
    drawBar(38, 337, 174, hero.hp, hero.maxHp, '#dd3333');
    txt(`${hero.hp}/${hero.maxHp}`, 40, 348, '#fff', 11);
    txt('MP', 16, 368, '#6699ff', 12);
    drawBar(38, 357, 174, hero.mp, hero.maxMp, '#3366cc');
    txt(`${hero.mp}/${hero.maxMp}`, 40, 368, '#fff', 11);
  }

  // ============================================================
  // 勝利画面を描画する
  // ============================================================
  function renderWin() {
    ctx.fillStyle = '#050520';
    ctx.fillRect(0, 0, 512, 384);

    // きらきらエフェクト（時間で動く星）
    const t = Date.now() / 700;
    ctx.fillStyle = '#ffd700';
    for (let i = 0; i < 28; i++) {
      const sx = ((Math.sin(i * 2.4 + t) * 0.5 + 0.5) * 512) | 0;
      const sy = ((Math.cos(i * 1.9 + t * 0.7) * 0.5 + 0.5) * 384) | 0;
      ctx.fillRect(sx, sy, 3, 3);
    }

    txt('★  Victory!  ★', 118, 130, '#ffd700', 36);
    txt('てきを  たおした！', 148, 190, '#ffffff', 20);
    txt(winMsg, 162, 228, '#aaffaa', 16);
    txt('なにかキーを押してマップへ', 130, 292, '#8888ff', 15);

    drawHero(120, 300, 2);
    if (foe) drawEnemy(foe, 340, 300, 2);
  }

  // ============================================================
  // ゲームオーバー画面を描画する
  // ============================================================
  function renderLose() {
    ctx.fillStyle = '#150000';
    ctx.fillRect(0, 0, 512, 384);
    txt('GAME  OVER', 128, 182, '#ff2222', 42);
    txt('ちからつきた…', 172, 248, '#cccccc', 20);
    txt('なにかキーを押してやりなおす', 112, 314, '#888888', 15);
  }

  // ============================================================
  // メインループ（毎フレーム呼ばれる）
  // ============================================================
  // ============================================================
  // HTML ステータスバーを更新する
  // ============================================================
  function updateStatusBar() {
    document.getElementById('statusName').textContent = `Lv.${hero.level}  ゆうしゃ  EXP ${hero.exp}  G ${hero.gold}`;

    // HP バー
    const hpRatio = hero.hp / hero.maxHp;
    const hpFill  = document.getElementById('hpBarFill');
    hpFill.style.width      = `${Math.round(hpRatio * 100)}%`;
    hpFill.style.background = hpRatio > 0.5 ? '#44dd44' : hpRatio > 0.25 ? '#dddd44' : '#dd3333';
    document.getElementById('hpText').textContent = `${hero.hp}/${hero.maxHp}`;

    // MP バー
    const mpFill = document.getElementById('mpBarFill');
    mpFill.style.width = `${Math.round(hero.mp / hero.maxMp * 100)}%`;
    document.getElementById('mpText').textContent = `${hero.mp}/${hero.maxMp}`;

    // 現在地（街にいるときだけ表示）
    const curTile = currentMap[hero.y] && currentMap[hero.y][hero.x];
    const inTown  = currentMap === townMap || curTile === T.STONE || curTile === T.HOUSE;
    document.getElementById('locationLabel').textContent = currentMap === dungeonMap ? '◆ くらやみの洞窟' : inTown ? '★ ヒカリのまち' : '';
  }

  function loop() {
    ctx.clearRect(0, 0, 512, 384);
    updateStatusBar();
    // TALK 状態はマップを下地として描いたうえで会話ウィンドウを重ねる
    if (state === S.MAP  || state === S.TALK) renderMap();
    if (state === S.TALK)   renderTalkWindow();
    if (state === S.BATTLE) renderBattle();
    if (state === S.WIN)    renderWin();
    if (state === S.LOSE)   renderLose();
    requestAnimationFrame(loop); // 次のフレームへ
  }

  // ============================================================
  // バトルボタンの表示・非表示
  // ============================================================
  function showBtns() {
    btnArea.innerHTML = `
      <button class="btn" onclick="doAtk()">⚔ こうげき</button>
      <button class="btn" onclick="doMagic()">✨ ファイア (MP2)</button>
      <button class="btn" onclick="doPotion()">ポーション</button>
      <button class="btn" onclick="doRun()">💨 にげる</button>
    `;
  }
  function hideBtns() {
    btnArea.innerHTML = '';
  }

  function showShopBtns() {
    btnArea.innerHTML = `
      <button class="btn" onclick="buyPotion()">ポーション 10G</button>
      <button class="btn" onclick="advanceDialogue()">とじる</button>
    `;
  }

  function buyPotion() {
    if (state !== S.TALK || !talkNpc || !talkNpc.shop) return;
    if (hero.gold < 10) {
      shopMsg = 'ゴールドが足りない！';
      return;
    }
    hero.gold -= 10;
    hero.potions++;
    shopMsg = `ポーションを買った！ 所持数 ${hero.potions}`;
  }

  // ============================================================
  // 会話（トーク）システム
  // ============================================================

  // 会話を開始する
  function openDialogue(npc) {
    if (npc.inn) {
      hero.hp = hero.maxHp;
      hero.mp = hero.maxMp;
    }
    if (npc.shop) shopMsg = '';
    if (npc.quest) questRewardMsg = '';
    talkNpc  = npc;
    talkPage = 0;
    state    = S.TALK;
    hideBtns();
    if (npc.shop) showShopBtns();
  }

  // セリフを1ページ進める（最終ページなら会話終了）
  function advanceDialogue() {
    if (!talkNpc) return;
    talkPage++;
    const lineCount = talkNpc.afterBossLines && bossDefeated ? talkNpc.afterBossLines.length : (talkNpc.inn || talkNpc.quest) ? 1 : talkNpc.lines.length;
    if (talkPage >= lineCount) {
      talkNpc  = null;
      talkPage = 0;
      state    = S.MAP;
      hideBtns();
    }
  }

  // 会話ウィンドウをマップの上に重ねて描画する
  function renderTalkWindow() {
    if (!talkNpc) return;

    // 半透明の背景ボックス
    ctx.fillStyle = 'rgba(4,4,28,0.95)';
    ctx.fillRect(8, 246, 496, 130);
    ctx.strokeStyle = '#8888cc';
    ctx.lineWidth = 2;
    ctx.strokeRect(8, 246, 496, 130);

    // NPC スプライト（小さく左端に表示）
    drawNPC(16, 254, 1, talkNpc.bodyCol, talkNpc.hairCol);

    // NPC 名前
    txt(talkNpc.name, 60, 272, '#ffd700', 14);

    let talkLines = talkNpc.lines;
    if (talkNpc.afterBossLines && bossDefeated) {
      talkLines = talkNpc.afterBossLines;
    } else if (talkNpc.shop) {
      talkLines = [shopMsg || 'HPとMPが回復した！ ポーションは1個10Gです'];
    } else if (talkNpc.inn) {
      talkLines = ['HPとMPが回復した！'];
    } else if (talkNpc.quest) {
      if (slimeKills >= 3) {
        if (!questDone) {
          const leveled = gainExp(5);
          questDone = true;
          questRewardMsg = leveled ? 'ありがとう！ 経験値を5獲得した！ レベルアップ！' : 'ありがとう！ 経験値を5獲得した！';
          talkLines = [questRewardMsg];
        } else if (questRewardMsg) {
          talkLines = [questRewardMsg];
        } else {
          talkLines = ['ありがとう！'];
        }
      } else {
        talkLines = ['スライムを3匹倒してきて'];
      }
    }

    // ページ番号
    txt(`${talkPage + 1}/${talkLines.length}`, 466, 272, '#666688', 11);

    // 区切り線
    ctx.fillStyle = '#4444aa';
    ctx.fillRect(60, 276, 430, 1);

    // セリフ（現在ページ）
    txt(talkLines[talkPage], 60, 306, '#ffffff', 14);

    // ページ送りプロンプト（点滅）
    if (Math.floor(Date.now() / 450) % 2) {
      const isLast = talkPage >= talkLines.length - 1;
      txt(isLast ? '[ とじる ]' : '[ つぎへ  ]', 376, 368, '#88aaff', 12);
    }
  }

  // ============================================================
  // バトル開始
  // ============================================================
  function chooseEnemy() {
    const enemies = currentMap === dungeonMap ? [BAT_BASE, GOBLIN_BASE] : [SLIME_BASE, BAT_BASE];
    return { ...enemies[rng(0, enemies.length - 1)] };
  }

  function startBattle() {
    foe      = chooseEnemy(); // マップに応じて敵を生成
    state    = S.BATTLE;
    heroTurn = true;
    msg      = `${foe.name} が　あらわれた！`;
    hideBtns();
    setTimeout(showBtns, 700); // 少し間を置いてからボタン表示
  }

  function startBossBattle() {
    if (bossDefeated) return;
    foe      = { ...DARK_KNIGHT_BASE };
    state    = S.BATTLE;
    heroTurn = true;
    msg      = `${foe.name} が　立ちはだかった！`;
    hideBtns();
    setTimeout(showBtns, 700);
  }

  // ============================================================
  // プレイヤーの行動：こうげき
  // ============================================================
  function doAtk() {
    if (!heroTurn || state !== S.BATTLE) return;
    hideBtns();
    const dmg = Math.max(1, hero.atk - foe.def + rng(-1, 3));
    foe.hp    = Math.max(0, foe.hp - dmg);
    msg       = `ゆうしゃの　こうげき！　${dmg} のダメージ！`;
    afterHeroAction();
  }

  // ============================================================
  // プレイヤーの行動：ファイア（まほう）
  // ============================================================
  function doMagic() {
    if (!heroTurn || state !== S.BATTLE) return;
    if (hero.mp < 2) {
      msg = 'MPが　たりない！';
      return;
    }
    hideBtns();
    hero.mp -= 2;
    const dmg = Math.max(1, hero.atk * 2 - foe.def + rng(0, 5));
    foe.hp    = Math.max(0, foe.hp - dmg);
    msg       = `ファイア！　${dmg} のダメージ！`;
    afterHeroAction();
  }

  // ============================================================
  // プレイヤーの行動：ポーション
  // ============================================================
  function doPotion() {
    if (!heroTurn || state !== S.BATTLE) return;
    if (hero.potions <= 0) {
      msg = 'ポーションを持っていない！';
      return;
    }
    hideBtns();
    hero.potions--;
    const beforeHp = hero.hp;
    hero.hp = Math.min(hero.maxHp, hero.hp + 15);
    msg = `ポーションを使った！ HPが ${hero.hp - beforeHp} 回復した！`;
    heroTurn = false;
    setTimeout(enemyTurn, 1300);
  }

  // ============================================================
  // プレイヤーの行動：にげる
  // ============================================================
  function doRun() {
    if (!heroTurn || state !== S.BATTLE) return;
    if (foe && foe.boss) {
      msg = 'ダークナイトからは　にげられない！';
      return;
    }
    hideBtns();
    if (Math.random() < 0.6) {
      msg = 'うまく　にげきった！';
      setTimeout(() => { state = S.MAP; }, 1000);
    } else {
      msg      = 'にげられなかった！';
      heroTurn = false;
      setTimeout(enemyTurn, 1300);
    }
  }

  // ============================================================
  // プレイヤー行動後の処理（敵が生きているか確認）
  // ============================================================
  function afterHeroAction() {
    if (foe.hp <= 0) {
      // 勝利！
      setTimeout(() => {
        if (foe.name === 'スライム') slimeKills++;
        const leveled = gainExp(foe.exp);
        hero.gold += foe.gold || 0;
        if (foe.boss) {
          bossDefeated = true;
          winMsg = leveled ? 'ダークナイトを倒した！ レベルアップ！' : 'ダークナイトを倒した！';
        } else {
          winMsg = leveled ? `${foe.exp} けいけんちと ${foe.gold || 0}Gを　えた！ レベルアップ！` : `${foe.exp} けいけんちと ${foe.gold || 0}Gを　えた！`;
        }
        state    = S.WIN;
      }, 900);
    } else {
      // 敵のターンへ
      heroTurn = false;
      setTimeout(enemyTurn, 1300);
    }
  }

  // ============================================================
  // 敵のターン（自動で攻撃してくる）
  // ============================================================
  function enemyTurn() {
    if (state !== S.BATTLE) return;
    const dmg = Math.max(1, foe.atk - hero.def + rng(-1, 3));
    hero.hp   = Math.max(0, hero.hp - dmg);
    msg       = `${foe.name}の　こうげき！　${dmg} のダメージ！`;
    if (hero.hp <= 0) {
      // ゲームオーバー
      setTimeout(() => { state = S.LOSE; }, 1000);
    } else {
      // プレイヤーのターンへ戻る
      heroTurn = true;
      setTimeout(() => {
        msg = 'どうする？';
        showBtns();
      }, 1300);
    }
  }

  // ============================================================
  // プレイヤーの移動
  // ============================================================
  function isFieldTownEntrance(x, y) {
    return currentMap === fieldMap && x === 10 && y === 2;
  }

  function isTownExit(x, y) {
    return currentMap === townMap && x === 7 && y === 10;
  }

  function isFieldDungeonEntrance(x, y) {
    return currentMap === fieldMap && x === 13 && y === 10;
  }

  function isDungeonExit(x, y) {
    return currentMap === dungeonMap && x === 7 && y === 11;
  }

  function switchMapIfNeeded() {
    if (isFieldTownEntrance(hero.x, hero.y)) {
      townReturn = { x: 9, y: 2 };
      currentMap = townMap;
      hero.x = 7;
      hero.y = 9;
      return true;
    }
    if (isFieldDungeonEntrance(hero.x, hero.y)) {
      dungeonReturn = { x: 13, y: 10 };
      currentMap = dungeonMap;
      hero.x = 7;
      hero.y = 10;
      return true;
    }
    if (isTownExit(hero.x, hero.y)) {
      currentMap = fieldMap;
      hero.x = townReturn.x;
      hero.y = townReturn.y;
      return true;
    }
    if (isDungeonExit(hero.x, hero.y)) {
      currentMap = fieldMap;
      hero.x = dungeonReturn.x;
      hero.y = dungeonReturn.y;
      return true;
    }
    return false;
  }

  function checkTreasureEvent() {
    if (currentMap !== dungeonMap || currentMap[hero.y][hero.x] !== T.CHEST || chestOpened) return;
    chestOpened = true;
    hero.gold += 20;
    showNotice('宝箱を開けた！ 20Gを手に入れた！');
  }

  function isBossAt(x, y) {
    return currentMap === dungeonMap && !bossDefeated && x === BOSS_POS.x && y === BOSS_POS.y;
  }

  function getAdjacentBoss() {
    for (const [dx, dy] of [[0,-1],[0,1],[-1,0],[1,0]]) {
      if (isBossAt(hero.x + dx, hero.y + dy)) return true;
    }
    return false;
  }

  function move(dx, dy) {
    if (moving || state !== S.MAP) return; // クールダウン中・マップ以外は動かない
    if (dy < 0) hero.dir = 'up';
    if (dy > 0) hero.dir = 'down';
    if (dx < 0) hero.dir = 'left';
    if (dx > 0) hero.dir = 'right';

    const nx = hero.x + dx;
    const ny = hero.y + dy;

    // マップの端を超えないようにする
    if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS) return;

    // 移動先にNPCがいれば、移動せずに話しかける
    const npc = getNpcAt(nx, ny);
    if (npc) {
      openDialogue(npc);
      return;
    }
    if (isBossAt(nx, ny)) {
      startBossBattle();
      return;
    }

    // 木・水・建物は通れない
    const tile = currentMap[ny][nx];
    if (tile === T.TREE || tile === T.WATER || tile === T.HOUSE) return;

    hero.x = nx;
    hero.y = ny;
    const switchedMap = switchMapIfNeeded();
    checkTreasureEvent();

    // ランダムエンカウント判定（草・花タイルのみ。石畳の街ではエンカウントなし）
    if (!switchedMap && currentMap === fieldMap && (tile === T.GRASS || tile === T.FLOWER) && Math.random() < ENC_RATE) {
      setTimeout(startBattle, 80);
    }
    if (!switchedMap && currentMap === dungeonMap && tile === T.STONE && Math.random() < ENC_RATE) {
      setTimeout(startBattle, 80);
    }

    // 移動クールダウン（連打防止）
    moving = true;
    setTimeout(() => { moving = false; }, 160);
  }

  function showNotice(text) {
    const notification = document.getElementById('notification');
    notification.textContent = text;
    setTimeout(() => {
      if (notification.textContent === text) notification.textContent = '';
    }, 1800);
  }

  function saveGame() {
    const data = {
      hero: {
        x: hero.x, y: hero.y,
        hp: hero.hp, maxHp: hero.maxHp,
        mp: hero.mp, maxMp: hero.maxMp,
        atk: hero.atk, def: hero.def,
        level: hero.level, exp: hero.exp,
        gold: hero.gold, potions: hero.potions,
        dir: hero.dir,
      },
      quest: {
        slimeKills,
        questDone,
        questRewardMsg,
      },
      chestOpened,
      bossDefeated,
      returns: {
        town: townReturn,
        dungeon: dungeonReturn,
      },
      map: currentMap === townMap ? 'town' : currentMap === dungeonMap ? 'dungeon' : 'field',
    };
    localStorage.setItem(SAVE_KEY, JSON.stringify(data));
    showNotice('セーブしました');
  }

  function loadGame() {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) {
      showNotice('セーブデータがありません');
      return;
    }
    try {
      const data = JSON.parse(raw);
      if (data.hero) Object.assign(hero, data.hero);
      hero.dir = hero.dir || 'down';
      if (data.quest) {
        slimeKills = data.quest.slimeKills || 0;
        questDone = !!data.quest.questDone;
        questRewardMsg = data.quest.questRewardMsg || '';
      }
      chestOpened = !!data.chestOpened;
      bossDefeated = !!data.bossDefeated;
      if (data.returns) {
        townReturn = data.returns.town || townReturn;
        dungeonReturn = data.returns.dungeon || dungeonReturn;
      } else if (data.fieldReturn) {
        townReturn = data.fieldReturn;
        dungeonReturn = data.fieldReturn;
      }
      currentMap = data.map === 'town' ? townMap : data.map === 'dungeon' ? dungeonMap : fieldMap;
      state = S.MAP;
      foe = null;
      talkNpc = null;
      talkPage = 0;
      moving = false;
      hideBtns();
      showNotice('ロードしました');
    } catch (e) {
      showNotice('ロードに失敗しました');
    }
  }

  // ============================================================
  // キーボード入力
  // ============================================================
  document.addEventListener('keydown', e => {
    if (e.shiftKey && (e.key === 's' || e.key === 'S')) {
      e.preventDefault();
      saveGame();
      return;
    }
    if (e.shiftKey && (e.key === 'l' || e.key === 'L')) {
      e.preventDefault();
      loadGame();
      return;
    }
    if (state === S.MAP) {
      if (e.key === 'ArrowUp'    || e.key === 'w') move(0, -1);
      if (e.key === 'ArrowDown'  || e.key === 's') move(0,  1);
      if (e.key === 'ArrowLeft'  || e.key === 'a') move(-1, 0);
      if (e.key === 'ArrowRight' || e.key === 'd') move( 1, 0);
      // Space・Enter・Z で隣接NPCに話しかける
      if (e.key === ' ' || e.key === 'Enter' || e.key === 'z' || e.key === 'Z') {
        e.preventDefault();
        const adj = getAdjacentNpc();
        if (adj) {
          openDialogue(adj);
        } else if (getAdjacentBoss()) {
          startBossBattle();
        }
      }
    } else if (state === S.TALK) {
      // Space・Enter・Z・Escape でセリフを進める／会話を閉じる
      if (e.key === ' ' || e.key === 'Enter' || e.key === 'z' || e.key === 'Z'
          || e.key === 'Escape') {
        e.preventDefault();
        advanceDialogue();
      }
    } else if (state === S.WIN) {
      backToMap();
    } else if (state === S.LOSE) {
      resetGame();
    }
  });

  // キャンバスをクリックしても勝利・ゲームオーバー画面を進められる
  canvas.addEventListener('click', () => {
    if (state === S.TALK) advanceDialogue();
    if (state === S.WIN)  backToMap();
    if (state === S.LOSE) resetGame();
  });

  // マップへ戻る
  function backToMap() {
    state = S.MAP;
    foe   = null;
    hideBtns();
  }

  // ゲームをリセット（最初から）
  function resetGame() {
    hero.hp = hero.maxHp;
    hero.mp = hero.maxMp;
    hero.x  = 1;
    hero.y  = 1;
    hero.dir = 'down';
    hero.gold = 0;
    hero.potions = 0;
    chestOpened = false;
    bossDefeated = false;
    townReturn = { x: 9, y: 2 };
    dungeonReturn = { x: 13, y: 10 };
    currentMap = fieldMap;
    state   = S.MAP;
    foe     = null;
    hideBtns();
  }

  // ============================================================
  // ゲーム開始！
  // ============================================================
  loop();
  </script>
</body>
</html>
